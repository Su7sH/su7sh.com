<script>
const W=()=>innerWidth,H=()=>innerHeight;

/* ═══ FILM GRAIN ═══ */
const grainC=document.getElementById('grain'),grainCtx=grainC.getContext('2d');
function renderGrain(){
  grainC.width=W();grainC.height=H();
  const d=grainCtx.createImageData(grainC.width,grainC.height);
  for(let i=0;i<d.data.length;i+=4){const v=Math.random()*255;d.data[i]=d.data[i+1]=d.data[i+2]=v;d.data[i+3]=12}
  grainCtx.putImageData(d,0,0);
}
renderGrain();setInterval(renderGrain,80);

/* ═══ AMBIENT PARTICLES (reusable) ═══ */
function drawAmbient(ctx,w,h,particles,mouseX,mouseY){
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
    const dm=Math.hypot(p.x-(mouseX||w/2),p.y-(mouseY||h/2));
    const boost=dm<150?.1*(1-dm/150):0;
    const twinkle=.5+.5*Math.sin(Date.now()*.002*p.speed+p.phase);
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${(p.op+boost)*twinkle})`;
    ctx.fill();
  });
}
function makeParticles(count,w,h,r,g,b){
  const pts=[];
  for(let i=0;i<count;i++)pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.08,size:.3+Math.random()*1,op:.03+Math.random()*.08,r:r+(Math.random()-.5)*30,g:g+(Math.random()-.5)*30,b:b+(Math.random()-.5)*30,speed:.5+Math.random()*2,phase:Math.random()*Math.PI*2});
  return pts;
}

/* ═══ PASSCODE ═══ */
const pcBg=document.getElementById('pc-bg'),pcCtx=pcBg.getContext('2d');
let pcParts=[];
function initPcBg(){pcBg.width=W();pcBg.height=H();pcParts=makeParticles(30,W(),H(),180,180,200)}
initPcBg();
(function pcLoop(){pcCtx.clearRect(0,0,pcBg.width,pcBg.height);drawAmbient(pcCtx,pcBg.width,pcBg.height,pcParts);requestAnimationFrame(pcLoop)})();

const CODE='777777';let inp='',att=0;
const dots=document.querySelectorAll('.dot'),dotsBox=document.getElementById('dots'),ttl=document.getElementById('title');
function press(n){if(inp.length>=6)return;if(navigator.vibrate)navigator.vibrate(8);inp+=n;dots[inp.length-1].classList.add('filled');if(inp.length===6)setTimeout(checkPass,280)}
function bksp(){if(!inp.length)return;inp=inp.slice(0,-1);dots[inp.length].classList.remove('filled')}
function checkPass(){
  if(inp===CODE){dots.forEach(d=>{d.classList.remove('filled');d.classList.add('success')});ttl.textContent='';setTimeout(()=>{document.getElementById('passcode').classList.add('gone');setTimeout(initBlackBox,1200)},600)}
  else{att++;dotsBox.classList.add('shake');if(navigator.vibrate)navigator.vibrate([40,25,40]);setTimeout(()=>{dotsBox.classList.remove('shake');dots.forEach(d=>d.classList.remove('filled'));inp='';ttl.textContent='Try Again'},550)}
}
document.querySelectorAll('.key[data-n]').forEach(k=>{k.addEventListener('click',()=>{k.classList.add('pressed');setTimeout(()=>k.classList.remove('pressed'),100);press(k.dataset.n)});k.addEventListener('touchstart',e=>{e.preventDefault();k.click()},{passive:false})});
document.getElementById('del').addEventListener('click',bksp);
document.addEventListener('keydown',e=>{if(document.getElementById('passcode').classList.contains('gone'))return;if(e.key>='0'&&e.key<='9')press(e.key);if(e.key==='Backspace')bksp()});

/* ═══ BLACK BOX ═══ */
let bbStillTimer=null,bbSolved=false,bbInteracted=false,bbDisturbs=0;
const bbMessages=['this is not what you think it is.','patience is a mechanic.','stop trying to control everything.'];
const bbCanvas=document.getElementById('bb-bg'),bbCtx=bbCanvas.getContext('2d');
let bbParts=[],bbMx=W()/2,bbMy=H()/2,bbFrozen=false;

function initBlackBox(){
  bbCanvas.width=W();bbCanvas.height=H();
  bbParts=makeParticles(50,W(),H(),160,140,180);
  document.getElementById('blackbox').classList.add('active');
  document.title='■';
  const box=document.getElementById('thebox'),msg=document.getElementById('bb-msg');

  function disturb(){
    if(bbSolved)return;bbInteracted=true;bbFrozen=false;
    box.classList.remove('awakening','shake');void box.offsetWidth;box.classList.add('shake');
    setTimeout(()=>{box.classList.remove('shake');box.style.borderColor='';box.style.boxShadow=''},400);
    clearTimeout(bbStillTimer);
    if(bbDisturbs<bbMessages.length){msg.textContent=bbMessages.slice(0,bbDisturbs+1).join('\n');msg.style.whiteSpace='pre-line';msg.classList.add('visible');bbDisturbs++}
    startStillTimer();
  }
  box.addEventListener('click',disturb);box.addEventListener('touchstart',disturb);
  document.addEventListener('mousemove',function bm(e){if(bbSolved)return;bbMx=e.clientX;bbMy=e.clientY;if(!bbInteracted)return;bbFrozen=false;clearTimeout(bbStillTimer);box.classList.remove('awakening');startStillTimer()});
  document.addEventListener('keydown',function bk(){if(bbSolved||!document.getElementById('blackbox').classList.contains('active'))return;disturb()});
  startStillTimer();
  bbLoop();
}
function bbLoop(){
  if(!document.getElementById('blackbox').classList.contains('active'))return;
  bbCtx.clearRect(0,0,bbCanvas.width,bbCanvas.height);
  if(!bbFrozen)drawAmbient(bbCtx,bbCanvas.width,bbCanvas.height,bbParts,bbMx,bbMy);
  else{bbParts.forEach(p=>{const twinkle=.5+.5*Math.sin(Date.now()*.001*p.speed+p.phase);bbCtx.beginPath();bbCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bbCtx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.op*twinkle*.5})`;bbCtx.fill()})}
  requestAnimationFrame(bbLoop);
}
function startStillTimer(){
  bbStillTimer=setTimeout(()=>{if(bbSolved)return;bbFrozen=true;document.getElementById('thebox').classList.add('awakening');
    bbStillTimer=setTimeout(()=>{if(bbSolved)return;document.getElementById('thebox').classList.add('opening');
      bbStillTimer=setTimeout(()=>{if(bbSolved)return;bbSolved=true;document.getElementById('thebox').classList.add('burst');setTimeout(startWarp,800)},2000)},3000)},4000);
}

/* ═══ WARP ═══ */
function startWarp(){
  document.getElementById('blackbox').style.transition='opacity .5s';document.getElementById('blackbox').style.opacity='0';document.getElementById('blackbox').style.pointerEvents='none';
  const warp=document.getElementById('warp');warp.classList.add('active');
  const c=document.getElementById('warpCanvas'),ctx=c.getContext('2d');
  const cw=c.width=W(),ch=c.height=H(),cx=cw/2,cy=ch/2;
  const stars=[];
  for(let i=0;i<400;i++){
    const a=Math.random()*Math.PI*2,dist=Math.random()*50+5;
    const temp=Math.random();
    stars.push({angle:a,dist,speed:Math.random()*2+1,len:0,brightness:Math.random()*.5+.5,
      r:180+temp*75,g:170+temp*60,b:200+temp*55});
  }
  let frame=0;const total=100;
  function animWarp(){
    frame++;const p=frame/total,accel=p*p*p;
    ctx.fillStyle=`rgba(0,0,0,${p<.7?.12:.04})`;ctx.fillRect(0,0,cw,ch);
    stars.forEach(s=>{
      s.dist+=s.speed*(1+accel*45);s.len=Math.min(s.dist*.35*accel,250);
      const x=cx+Math.cos(s.angle)*s.dist,y=cy+Math.sin(s.angle)*s.dist;
      const x2=cx+Math.cos(s.angle)*(s.dist-s.len),y2=cy+Math.sin(s.angle)*(s.dist-s.len);
      const alpha=Math.min(1,accel*3)*s.brightness;
      const g=ctx.createLinearGradient(x2,y2,x,y);
      g.addColorStop(0,'transparent');g.addColorStop(.3,`rgba(${s.r},${s.g},${s.b},${alpha*.3})`);g.addColorStop(1,`rgba(255,250,240,${alpha})`);
      ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x,y);ctx.strokeStyle=g;ctx.lineWidth=p<.5?1:1.5+accel;ctx.stroke();
    });
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,50+accel*250);
    grd.addColorStop(0,`rgba(201,125,62,${accel*.2})`);grd.addColorStop(.5,`rgba(100,50,150,${accel*.05})`);grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,cw,ch);
    if(frame<total)requestAnimationFrame(animWarp);
    else{const fl=document.getElementById('warpFlash');fl.style.opacity='1';setTimeout(()=>{warp.style.opacity='0';fl.style.transition='opacity 1.5s';fl.style.opacity='0';setTimeout(()=>warp.classList.remove('active'),1600);initCosmos()},150)}
  }
  animWarp();
}

/* ═══ COSMOS — THE SEARCH ═══ */
let cmx=0,cmy=0,cosmosReady=false,cosmosCompleted=false,completionTime=0,foundCount=0;
const REVEAL_R=100;
const cosC=document.getElementById('cosmos'),cosCtx=cosC.getContext('2d');
const foundLabel=document.getElementById('found-count');
let allStars=[],amberStars=[],shootingStars=[];

document.addEventListener('mousemove',e=>{cmx=e.clientX;cmy=e.clientY});
document.addEventListener('touchmove',e=>{cmx=e.touches[0].clientX;cmy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchstart',e=>{cmx=e.touches[0].clientX;cmy=e.touches[0].clientY},{passive:true});

function initCosmos(){
  const cw=cosC.width=W(),ch=cosC.height=H();cmx=cw/2;cmy=ch/2;
  document.getElementById('constellation').classList.add('active');document.title='✦';

  // Background stars — varied color temperatures
  for(let i=0;i<250;i++){
    const temp=Math.random();
    let r,g,b;
    if(temp<.3){r=180;g=190;b=230} // blue
    else if(temp<.6){r=220;g=215;b=210} // white
    else if(temp<.85){r=240;g=220;b=190} // warm
    else{r=200;g=180;b=220} // violet
    allStars.push({x:Math.random()*cw,y:Math.random()*ch,size:.2+Math.random()*2.2,r,g,b,
      twSpeed:.3+Math.random()*3,twOff:Math.random()*Math.PI*2,isAmber:false,found:false,
      depth:.3+Math.random()*.7});
  }

  // 7 amber stars
  [{x:.12,y:.25},{x:.78,y:.12},{x:.88,y:.55},{x:.22,y:.72},{x:.52,y:.42},{x:.62,y:.82},{x:.38,y:.15}].forEach(z=>{
    const s={x:z.x*cw+(Math.random()-.5)*cw*.06,y:z.y*ch+(Math.random()-.5)*ch*.06,
      size:2.5+Math.random()*1.5,r:230,g:180,b:95,twSpeed:1+Math.random()*1.5,twOff:Math.random()*Math.PI*2,
      isAmber:true,found:false,depth:1,pulsePhase:Math.random()*Math.PI*2};
    allStars.push(s);amberStars.push(s);
  });

  foundLabel.textContent='0 / 7';cosmosReady=true;
  cosC.addEventListener('click',cosClick);cosC.addEventListener('touchend',e=>{e.preventDefault();cosClick()});
  cosmosLoop();
  // Shooting stars
  setInterval(()=>{if(!cosmosReady)return;
    shootingStars.push({x:Math.random()*cw*.8,y:Math.random()*ch*.4,angle:Math.PI*.1+Math.random()*.3,speed:8+Math.random()*6,life:0,maxLife:30+Math.random()*20})},4000);
}

function cosClick(){
  if(!cosmosReady||cosmosCompleted)return;
  for(const s of amberStars){
    if(s.found)continue;
    if(Math.hypot(s.x-cmx,s.y-cmy)<REVEAL_R){
      s.found=true;foundCount++;if(navigator.vibrate)navigator.vibrate(15);
      foundLabel.textContent=foundCount+' / 7';
      if(foundCount===7){cosmosCompleted=true;completionTime=Date.now();foundLabel.textContent='✦';
        setTimeout(()=>{document.getElementById('constellation').style.transition='opacity 2s';document.getElementById('constellation').style.opacity='0';document.getElementById('constellation').style.pointerEvents='none';setTimeout(initSimon,2000)},4000)}
      return;
    }
  }
}

function cosmosLoop(){
  if(!cosmosReady)return;
  const cw=cosC.width,ch=cosC.height,t=Date.now()*.001;
  cosCtx.clearRect(0,0,cw,ch);

  // Deep sky gradient
  const bg=cosCtx.createRadialGradient(cw*.25,ch*.3,0,cw*.5,ch*.5,cw*.8);
  bg.addColorStop(0,'#0e0922');bg.addColorStop(.3,'#080514');bg.addColorStop(.6,'#04020a');bg.addColorStop(1,'#000');
  cosCtx.fillStyle=bg;cosCtx.fillRect(0,0,cw,ch);

  // Nebula layers
  const nt=t*.05;
  [[cw*.2,ch*.3,280,60,15,90,.035],[cw*.75,ch*.55,320,15,35,80,.025],[cw*.5,ch*.78,200,100,45,20,.02],[cw*.6,ch*.2,180,50,30,90,.015]].forEach(([nx,ny,nr,cr,cg,cb,op])=>{
    const g=cosCtx.createRadialGradient(nx+Math.sin(nt+cr)*25,ny+Math.cos(nt+cg)*20,0,nx,ny,nr);
    g.addColorStop(0,`rgba(${cr},${cg},${cb},${op})`);g.addColorStop(.5,`rgba(${cr},${cg},${cb},${op*.3})`);g.addColorStop(1,'transparent');
    cosCtx.fillStyle=g;cosCtx.fillRect(0,0,cw,ch);
  });

  // Stars
  allStars.forEach(s=>{
    const dm=Math.hypot(s.x-cmx,s.y-cmy);
    const inR=dm<REVEAL_R;
    const edge=inR?1-dm/REVEAL_R:0;
    const visible=s.found||(inR&&!cosmosCompleted);
    const postReveal=cosmosCompleted;
    if(!visible&&!postReveal)return;

    const tw=.4+.6*Math.sin(t*s.twSpeed+s.twOff);
    let alpha;
    if(s.found)alpha=.7+tw*.3;
    else if(postReveal){const reveal=Math.min(1,(Date.now()-completionTime)/3000);alpha=reveal*(.12+tw*.15)}
    else alpha=edge*edge*(.3+tw*.5);

    const sz=s.size*(s.found?1.4:1)*s.depth;

    // Amber glow
    if(s.isAmber&&(s.found||inR)){
      const ga=s.found?.2:(edge*.1);const gs=s.found?35:20;
      const gr=cosCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,gs);
      gr.addColorStop(0,`rgba(201,125,62,${ga})`);gr.addColorStop(.5,`rgba(201,125,62,${ga*.3})`);gr.addColorStop(1,'transparent');
      cosCtx.fillStyle=gr;cosCtx.fillRect(s.x-gs,s.y-gs,gs*2,gs*2);
      if(s.found){const pulse=.2+.2*Math.sin(t*2+s.pulsePhase);
        cosCtx.beginPath();cosCtx.arc(s.x,s.y,sz*4+pulse*10,0,Math.PI*2);
        cosCtx.strokeStyle=`rgba(201,125,62,${pulse*.08})`;cosCtx.lineWidth=.5;cosCtx.stroke()}
    }

    // Star core
    cosCtx.beginPath();cosCtx.arc(s.x,s.y,sz,0,Math.PI*2);
    cosCtx.fillStyle=`rgba(${s.r},${s.g},${s.b},${alpha})`;
    if(s.found&&s.isAmber){cosCtx.shadowColor='rgba(201,125,62,.5)';cosCtx.shadowBlur=15}
    cosCtx.fill();cosCtx.shadowBlur=0;

    // Diffraction spikes on larger stars
    if(sz>1.8&&alpha>.25){
      cosCtx.globalAlpha=alpha*.15;
      cosCtx.strokeStyle=`rgba(${s.r},${s.g},${s.b},.8)`;cosCtx.lineWidth=.3;
      [[sz*5,0],[0,sz*5],[sz*3.5,sz*3.5],[-sz*3.5,sz*3.5]].forEach(([dx,dy])=>{
        cosCtx.beginPath();cosCtx.moveTo(s.x-dx,s.y-dy);cosCtx.lineTo(s.x+dx,s.y+dy);cosCtx.stroke()});
      cosCtx.globalAlpha=1;
    }
  });

  // Shooting stars
  shootingStars=shootingStars.filter(ss=>{
    ss.life++;ss.x+=Math.cos(ss.angle)*ss.speed;ss.y+=Math.sin(ss.angle)*ss.speed;
    const p=ss.life/ss.maxLife,alpha=p<.3?p/.3:1-(p-.3)/.7;
    const len=40+p*80;
    cosCtx.beginPath();
    cosCtx.moveTo(ss.x,ss.y);cosCtx.lineTo(ss.x-Math.cos(ss.angle)*len,ss.y-Math.sin(ss.angle)*len);
    const g=cosCtx.createLinearGradient(ss.x,ss.y,ss.x-Math.cos(ss.angle)*len,ss.y-Math.sin(ss.angle)*len);
    g.addColorStop(0,`rgba(255,250,240,${alpha*.6})`);g.addColorStop(1,'transparent');
    cosCtx.strokeStyle=g;cosCtx.lineWidth=.8;cosCtx.stroke();
    return ss.life<ss.maxLife;
  });

  // Connections after completion
  if(cosmosCompleted){
    const reveal=Math.min(1,(Date.now()-completionTime)/2500);
    cosCtx.globalAlpha=reveal*.5;
    for(let i=0;i<amberStars.length-1;i++){
      cosCtx.beginPath();cosCtx.moveTo(amberStars[i].x,amberStars[i].y);cosCtx.lineTo(amberStars[i+1].x,amberStars[i+1].y);
      cosCtx.strokeStyle='rgba(201,125,62,.25)';cosCtx.lineWidth=.6;cosCtx.shadowColor='rgba(201,125,62,.3)';cosCtx.shadowBlur=12;cosCtx.stroke();cosCtx.shadowBlur=0}
    cosCtx.globalAlpha=1;
  }

  // Telescope lens
  if(!cosmosCompleted){
    cosCtx.beginPath();cosCtx.arc(cmx,cmy,REVEAL_R,0,Math.PI*2);
    cosCtx.strokeStyle='rgba(255,255,255,.03)';cosCtx.lineWidth=.8;cosCtx.stroke();
    const lens=cosCtx.createRadialGradient(cmx,cmy,0,cmx,cmy,REVEAL_R);
    lens.addColorStop(0,'rgba(200,190,220,.012)');lens.addColorStop(.6,'rgba(200,190,220,.004)');lens.addColorStop(1,'transparent');
    cosCtx.fillStyle=lens;cosCtx.beginPath();cosCtx.arc(cmx,cmy,REVEAL_R,0,Math.PI*2);cosCtx.fill();
    // Crosshair
    cosCtx.strokeStyle='rgba(201,125,62,.08)';cosCtx.lineWidth=.3;
    cosCtx.beginPath();cosCtx.moveTo(cmx-8,cmy);cosCtx.lineTo(cmx+8,cmy);cosCtx.moveTo(cmx,cmy-8);cosCtx.lineTo(cmx,cmy+8);cosCtx.stroke();
  }
  requestAnimationFrame(cosmosLoop);
}

/* ═══ SIMON ═══ */
let simonSeq=[],simonInput=[],simonRound=0,simonLocked=true;
const TARGET_ROUNDS=7,orbs=document.querySelectorAll('.orb'),simonRoundEl=document.getElementById('simon-round');
const simonCanvas=document.getElementById('simon-bg'),simonCtx=simonCanvas.getContext('2d');
let simonParts=[];

function initSimon(){
  simonCanvas.width=W();simonCanvas.height=H();
  simonParts=makeParticles(40,W(),H(),100,80,140);
  document.getElementById('simon').classList.add('active');document.title='◉';
  simonSeq=[];simonRound=0;setTimeout(nextSimonRound,1200);simonBgLoop();
}
function simonBgLoop(){
  if(!document.getElementById('simon').classList.contains('active'))return;
  simonCtx.clearRect(0,0,simonCanvas.width,simonCanvas.height);
  drawAmbient(simonCtx,simonCanvas.width,simonCanvas.height,simonParts);
  requestAnimationFrame(simonBgLoop);
}
function nextSimonRound(){simonRound++;simonRoundEl.textContent=simonRound+' / '+TARGET_ROUNDS;simonSeq.push(Math.floor(Math.random()*4));simonInput=[];simonLocked=true;playSeq(0)}
function playSeq(i){if(i>=simonSeq.length){simonLocked=false;return}setTimeout(()=>{flashOrb(simonSeq[i]);setTimeout(()=>playSeq(i+1),450)},300)}
function flashOrb(idx){orbs[idx].classList.add('flash-'+idx);if(navigator.vibrate)navigator.vibrate(8);setTimeout(()=>orbs[idx].classList.remove('flash-'+idx),350)}

orbs.forEach(orb=>{
  orb.addEventListener('click',()=>{
    if(simonLocked)return;const idx=+orb.dataset.o;flashOrb(idx);simonInput.push(idx);
    if(simonInput[simonInput.length-1]!==simonSeq[simonInput.length-1]){
      simonLocked=true;orbs.forEach(o=>o.classList.add('wrong-orb'));if(navigator.vibrate)navigator.vibrate([40,25,40]);
      setTimeout(()=>{orbs.forEach(o=>o.classList.remove('wrong-orb'));simonSeq=[];simonRound=0;setTimeout(nextSimonRound,600)},800);return}
    if(simonInput.length===simonSeq.length){simonLocked=true;
      if(simonRound>=TARGET_ROUNDS){simonRoundEl.textContent='';let vf=0;const vi=setInterval(()=>{orbs.forEach((o,j)=>o.classList.add('flash-'+j));setTimeout(()=>orbs.forEach((o,j)=>o.classList.remove('flash-'+j)),200);vf++;if(vf>=3){clearInterval(vi);setTimeout(simonComplete,600)}},400)}
      else setTimeout(nextSimonRound,800)}
  });
  orb.addEventListener('touchend',e=>{e.preventDefault();orb.click()});
});

function simonComplete(){
  document.getElementById('simon').style.transition='opacity 1.5s';document.getElementById('simon').style.opacity='0';document.getElementById('simon').style.pointerEvents='none';
  setTimeout(()=>{document.getElementById('wip').classList.add('active');document.title='WIP';initLights()},1800);
}

/* ═══ WIP LIGHTS ═══ */
function initLights(){
  const c=document.getElementById('lightsCanvas'),ctx=c.getContext('2d');c.width=W();c.height=H();
  const wipEl=document.getElementById('wipText'),spans=wipEl.querySelectorAll('span');
  const colors=[[255,59,48],[52,199,89],[255,204,0],[0,122,255],[255,45,85],[255,149,0],[175,82,222],[0,199,190]];
  const lights=[];
  spans.forEach(span=>{
    const r=span.getBoundingClientRect(),ch=span.textContent;
    const l=r.left,t=r.top,w=r.width,h=r.height,mx=l+w/2;let pts=[];
    if(ch==='W'){for(let i=0;i<7;i++){const p=i/6;pts.push({x:l+w*.08+p*w*.17,y:t+h*.05+p*h*.9})}for(let i=0;i<4;i++){const p=i/3;pts.push({x:l+w*.25+p*w*.12,y:t+h*.95-p*h*.4})}for(let i=0;i<4;i++){const p=i/3;pts.push({x:mx+w*.1+p*w*.12,y:t+h*.95-p*h*.4})}for(let i=0;i<7;i++){const p=i/6;pts.push({x:l+w*.7+p*w*.2,y:t+h*.95-p*h*.9})}}
    else if(ch==='I'){for(let i=0;i<9;i++){const p=i/8;pts.push({x:mx+(Math.random()-.5)*4,y:t+h*.05+p*h*.9})}}
    else if(ch==='P'){for(let i=0;i<8;i++){const p=i/7;pts.push({x:l+w*.2,y:t+h*.05+p*h*.9})}for(let i=0;i<4;i++){const p=i/3;pts.push({x:l+w*.2+p*w*.45,y:t+h*.05})}for(let i=0;i<6;i++){const a=-Math.PI*.45+i*Math.PI*.45/5;pts.push({x:l+w*.6+Math.cos(a)*w*.25,y:t+h*.27+Math.sin(a)*h*.2})}for(let i=0;i<3;i++){const p=i/2;pts.push({x:l+w*.2+p*w*.35,y:t+h*.48})}}
    pts.forEach(p=>lights.push({x:p.x,y:p.y,c:colors[Math.floor(Math.random()*colors.length)],phase:Math.random()*Math.PI*2}));
  });
  (function anim(){ctx.clearRect(0,0,c.width,c.height);const t=Date.now()*.003;lights.forEach(l=>{const b=.3+.7*Math.sin(t+l.phase),sz=.8+b*.7,[cr,cg,cb]=l.c;ctx.beginPath();ctx.arc(l.x,l.y,sz*3,0,Math.PI*2);ctx.fillStyle=`rgba(${cr},${cg},${cb},${b*.06})`;ctx.fill();ctx.beginPath();ctx.arc(l.x,l.y,sz,0,Math.PI*2);ctx.fillStyle=`rgba(${cr},${cg},${cb},${b})`;ctx.shadowColor=`rgba(${cr},${cg},${cb},.4)`;ctx.shadowBlur=4*b;ctx.fill();ctx.shadowBlur=0});requestAnimationFrame(anim)})();
}

const ctxS=document.createElement('style');ctxS.textContent='@keyframes ctxF{0%{opacity:1}100%{opacity:0}}';document.head.appendChild(ctxS);
