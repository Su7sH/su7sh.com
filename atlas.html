<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#07080a">
<title>·</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* A work of art — vivid, jaw-dropping antechamber.
     Inspired by high-craft experimental sites (geometric artistry like Species in Pieces, pure CSS/SVG mastery like Lynn Fisher).
     No adherence to the site's usual restraint. Rich, artistic, immersive. */
  :root {
    color-scheme: dark;
    --bg: #05070f;
    --text: #e8e6df;
    --text-muted: #8a8578;
    --accent-brain: #7aa8c9;   /* cool luminous for intelligence */
    --accent-body: #c9a26b;    /* warm precise for embodiment */
    --serif: 'Instrument Serif', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-weight: 300;
    line-height: 1.65;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  a { color: inherit; text-decoration: none; }
  :focus-visible { outline: 2px solid rgba(255,255,255,.4); outline-offset: 4px; }

  /* artistic background canvas layer */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.65;
  }

  /* subtle artistic grain + depth */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 30% 20%, rgba(120,140,170,.06) 0%, transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(170,130,90,.05) 0%, transparent 55%);
    pointer-events: none;
    z-index: 2;
  }

  /* veil */
  #veil {
    position: fixed;
    inset: 0;
    background: #05070f;
    z-index: 4000;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1200ms cubic-bezier(.16,1,.3,1);
  }

  /* return — artistic, quiet */
  #return {
    position: fixed;
    top: 32px;
    right: 36px;
    z-index: 3000;
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .3em;
    text-transform: lowercase;
    color: rgba(232,230,223,.25);
    padding: 8px 16px;
    transition: color 600ms ease, letter-spacing 600ms ease;
  }
  #return:hover {
    color: var(--text);
    letter-spacing: .4em;
  }

  main {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .intro {
    margin-bottom: 3.5rem;
    max-width: 620px;
  }
  .intro .epigraph {
    font-family: var(--serif);
    font-size: 1.45rem;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.35;
    letter-spacing: -.01em;
  }

  .emblems {
    display: flex;
    gap: 6rem;
    align-items: center;
    width: 100%;
    max-width: 1100px;
    justify-content: center;
  }
  @media (max-width: 720px) {
    .emblems { flex-direction: column; gap: 3.5rem; }
  }

  .emblem {
    position: relative;
    width: 320px;
    cursor: pointer;
    transition: transform 900ms cubic-bezier(.16,1,.3,1);
  }
  .emblem:hover {
    transform: translateY(-4px);
  }
  .emblem .art {
    width: 100%;
    height: 320px;
    display: block;
    position: relative;
  }
  .emblem .art svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,.6));
    transition: filter 600ms ease;
  }
  .emblem:hover .art svg {
    filter: drop-shadow(0 20px 50px rgba(0,0,0,.5));
  }

  /* mouse-driven subtle artistic lighting across the composition */
  .emblems {
    --mx: 0.5;
    --my: 0.5;
  }
  .emblem .art svg {
    transition: filter 600ms ease;
  }
  .emblem:hover .art svg {
    filter: drop-shadow(0 25px 60px rgba(0,0,0,.35)) 
            drop-shadow(calc((var(--mx) - 0.5) * 18px) calc((var(--my) - 0.5) * 12px) 28px rgba(255,255,255,.08));
  }

  .emblem .label {
    margin-top: 1.1rem;
    font-size: .95rem;
    letter-spacing: .08em;
    color: var(--text-muted);
    font-family: var(--serif);
    font-style: italic;
  }

  /* vivid activation styles for the art pieces */
  .emblem.brain .art svg path,
  .emblem.brain .art svg circle {
    transition: stroke 400ms ease, fill 400ms ease, opacity 400ms ease;
  }
  .emblem:hover.brain .art svg .active {
    stroke: var(--accent-brain);
    filter: brightness(1.3) saturate(1.4);
  }

  .emblem.body .art svg path,
  .emblem.body .art svg circle {
    transition: stroke 400ms ease, fill 400ms ease, opacity 400ms ease;
  }
  .emblem:hover.body .art svg .active {
    stroke: var(--accent-body);
    filter: brightness(1.25) saturate(1.3);
  }

  /* drawing animation classes */
  .emblem .art svg .draw {
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
    transition: stroke-dashoffset 1600ms cubic-bezier(.2,1,.2,1);
  }
  .emblem:hover .art svg .draw {
    stroke-dashoffset: 0;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="veil" aria-hidden="true"></div>

<a id="return" href="index.html">&larr; return</a>

<main>
  <div class="intro">
    <p class="epigraph">behind the room — two maps.<br>choose the frontier that will claim you.</p>
  </div>

  <div class="emblems">
    <!-- BRAIN: cosmic neural constellation. jaw-dropping abstract intelligence.
         Vivid on engagement — lines draw, nodes bloom with cool light, forms breathe. -->
    <a href="brain.html" class="emblem brain" aria-label="The Atlas of Intelligence">
      <div class="art">
        <svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="brainGrad" x1="20%" y1="20%" x2="80%" y2="80%">
              <stop offset="0%" stop-color="#7aa8c9"/>
              <stop offset="100%" stop-color="#a8c4d8"/>
            </linearGradient>
          </defs>
          <!-- outer cosmic shell -->
          <circle cx="160" cy="160" r="138" stroke="#3a3f4a" stroke-width="1.5" opacity="0.4"/>
          <!-- intricate neural web - many layers for complexity and beauty -->
          <g stroke="#e8e6df" stroke-width="1.2" stroke-linecap="round">
            <!-- main radiating arms -->
            <path class="draw" d="M160 22 Q160 80 160 140" stroke="url(#brainGrad)" stroke-width="2.5"/>
            <path class="draw" d="M160 298 Q160 240 160 180" stroke="url(#brainGrad)" stroke-width="2.5"/>
            <path class="draw" d="M22 160 Q80 160 140 160" stroke="url(#brainGrad)" stroke-width="2.5"/>
            <path class="draw" d="M298 160 Q240 160 180 160" stroke="url(#brainGrad)" stroke-width="2.5"/>
            <!-- elegant curves and connections -->
            <path class="draw" d="M70 70 Q110 110 160 140"/>
            <path class="draw" d="M250 70 Q210 110 160 140"/>
            <path class="draw" d="M70 250 Q110 210 160 180"/>
            <path class="draw" d="M250 250 Q210 210 160 180"/>
            <!-- fine mesh - complexity -->
            <path class="draw" d="M95 55 Q130 95 160 120"/>
            <path class="draw" d="M225 55 Q190 95 160 120"/>
            <path class="draw" d="M95 265 Q130 225 160 200"/>
            <path class="draw" d="M225 265 Q190 225 160 200"/>
          </g>
          <!-- glowing nodes -->
          <g fill="#7aa8c9" filter="url(#glow)">
            <circle cx="160" cy="60" r="4.5" class="active"/>
            <circle cx="160" cy="260" r="4.5" class="active"/>
            <circle cx="60" cy="160" r="4.5" class="active"/>
            <circle cx="260" cy="160" r="4.5" class="active"/>
            <circle cx="105" cy="105" r="3.5" class="active"/>
            <circle cx="215" cy="105" r="3.5" class="active"/>
            <circle cx="105" cy="215" r="3.5" class="active"/>
            <circle cx="215" cy="215" r="3.5" class="active"/>
            <circle cx="160" cy="160" r="7" class="active"/>
          </g>
          <!-- inner delicate structure for depth -->
          <g stroke="#a8c4d8" stroke-width="0.8" opacity="0.6">
            <path class="draw" d="M120 90 Q160 130 200 90"/>
            <path class="draw" d="M120 230 Q160 190 200 230"/>
            <circle cx="140" cy="140" r="2"/>
            <circle cx="180" cy="140" r="2"/>
            <circle cx="140" cy="180" r="2"/>
            <circle cx="180" cy="180" r="2"/>
          </g>
        </svg>
      </div>
      <div class="label">The Atlas of Intelligence</div>
    </a>

    <!-- BODY: vivid abstract embodiment. elegant mechanical poetry.
         Precise lines, articulated beauty. On hover, structure articulates and warms. -->
    <a href="body/index.html" class="emblem body" aria-label="Frontier Robotics">
      <div class="art">
        <svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glowBody" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="90%">
              <stop offset="0%" stop-color="#c9a26b"/>
              <stop offset="100%" stop-color="#e8d4a8"/>
            </linearGradient>
          </defs>
          <!-- elegant outer presence -->
          <ellipse cx="160" cy="160" rx="92" ry="128" stroke="#3a3f4a" stroke-width="1.5" opacity="0.35"/>
          <!-- head -->
          <circle cx="160" cy="68" r="22" stroke="#e8e6df" stroke-width="2.5"/>
          <!-- neck -->
          <line x1="160" y1="90" x2="160" y2="108" stroke="#e8e6df" stroke-width="3"/>
          <!-- shoulders & clavicle - architectural -->
          <path d="M115 108 Q160 122 205 108" stroke="#e8e6df" stroke-width="2.2"/>
          <!-- torso - strong vertical presence -->
          <line x1="132" y1="122" x2="132" y2="198" stroke="#e8e6df" stroke-width="2.8"/>
          <line x1="188" y1="122" x2="188" y2="198" stroke="#e8e6df" stroke-width="2.8"/>
          <!-- pelvis articulation -->
          <path d="M132 198 Q160 210 188 198" stroke="#e8e6df" stroke-width="2"/>
          <!-- left arm - beautiful mechanics -->
          <path class="draw" d="M115 115 Q88 155 78 205" stroke="url(#bodyGrad)" stroke-width="2.5"/>
          <path class="draw" d="M78 205 Q70 235 85 262" stroke="url(#bodyGrad)" stroke-width="2.2"/>
          <!-- right arm -->
          <path class="draw" d="M205 115 Q232 155 242 205" stroke="url(#bodyGrad)" stroke-width="2.5"/>
          <path class="draw" d="M242 205 Q250 235 235 262" stroke="url(#bodyGrad)" stroke-width="2.2"/>
          <!-- left leg -->
          <path class="draw" d="M140 210 Q118 265 105 295" stroke="url(#bodyGrad)" stroke-width="2.5"/>
          <!-- right leg -->
          <path class="draw" d="M180 210 Q202 265 215 295" stroke="url(#bodyGrad)" stroke-width="2.5"/>
          <!-- precise joints - vivid on hover -->
          <g fill="#c9a26b" filter="url(#glowBody)">
            <circle cx="115" cy="115" r="5" class="active"/>
            <circle cx="78" cy="205" r="4.5" class="active"/>
            <circle cx="205" cy="115" r="5" class="active"/>
            <circle cx="242" cy="205" r="4.5" class="active"/>
            <circle cx="140" cy="210" r="5" class="active"/>
            <circle cx="180" cy="210" r="5" class="active"/>
            <circle cx="105" cy="295" r="3.8" class="active"/>
            <circle cx="215" cy="295" r="3.8" class="active"/>
            <!-- core heart -->
            <circle cx="160" cy="155" r="7" class="active"/>
          </g>
          <!-- internal structural poetry -->
          <g stroke="#e8d4a8" stroke-width="0.9" opacity="0.5">
            <line x1="160" y1="108" x2="160" y2="198"/>
            <path d="M132 145 Q160 158 188 145"/>
            <path d="M132 175 Q160 188 188 175"/>
          </g>
        </svg>
      </div>
      <div class="label">Frontier Robotics</div>
    </a>
  </div>
</main>

<script>
  /* artistic background: subtle cosmic dust / flowing particles. pure vanilla Canvas. */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d', { alpha: true });
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function createParticles() {
    particles = [];
    for (let i = 0; i < 38; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.12,
        vy: (Math.random() - 0.5) * 0.12,
        r: Math.random() * 1.4 + 0.6,
        alpha: Math.random() * 0.35 + 0.12
      });
    }
  }
  createParticles();

  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(232,230,223,0.7)';
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }
    requestAnimationFrame(draw);
  }
  draw();

  /* vivid artistic interactions */
  const veilEl = document.getElementById('veil');
  const emblems = document.querySelectorAll('.emblem');

  // entrance
  setTimeout(() => {
    if (veilEl) veilEl.style.opacity = '0';
    setTimeout(() => { if (veilEl) veilEl.style.display = 'none'; }, 1200);
  }, 180);

  // bfcache
  window.addEventListener('pageshow', e => {
    if (e.persisted && veilEl) {
      veilEl.style.transition = 'none';
      veilEl.style.opacity = '0';
      veilEl.style.display = 'none';
    }
  });

  // hover magic + click drama
  emblems.forEach(emblem => {
    const svg = emblem.querySelector('svg');
    let isActive = false;

    emblem.addEventListener('mouseenter', () => {
      if (svg) svg.style.filter = 'drop-shadow(0 25px 60px rgba(0,0,0,.35)) brightness(1.08)';
      isActive = true;
    });
    emblem.addEventListener('mouseleave', () => {
      if (svg) svg.style.filter = '';
      isActive = false;
    });

    emblem.addEventListener('click', e => {
      e.preventDefault();
      const target = emblem.getAttribute('href');
      if (!target) return;

      // jaw-dropping exit: the chosen emblem blooms while the page gently recedes
      emblem.style.transition = 'transform 650ms cubic-bezier(.16,1,.3,1), opacity 650ms ease';
      emblem.style.transform = 'scale(1.08)';
      emblem.style.opacity = '0.15';

      // dim the other
      emblems.forEach(el => { if (el !== emblem) el.style.transition = 'opacity 650ms ease'; el.style.opacity = '0.08'; });

      // artistic veil re-entry
      if (veilEl) {
        veilEl.style.transition = 'none';
        veilEl.style.opacity = '0';
        veilEl.style.display = 'block';
        requestAnimationFrame(() => {
          veilEl.style.transition = 'opacity 950ms cubic-bezier(.16,1,.3,1)';
          veilEl.style.opacity = '1';
        });
      }

      setTimeout(() => {
        window.location.href = target;
      }, 820);
    });
  });

  // bonus: very subtle mouse light on the whole scene for vividness
  let mouseX = 0.5, mouseY = 0.5;
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
    document.body.style.setProperty('--mx', mouseX);
    document.body.style.setProperty('--my', mouseY);
  });
</script>

</body>
</html>
