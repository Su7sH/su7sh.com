<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#04060a">
<title>·</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#04060a;overflow:hidden;user-select:none;-webkit-user-select:none;font-family:'Cormorant Garamond',Georgia,serif;color:#dfe6f0}
canvas{display:block}

#grain{position:fixed;inset:0;z-index:150;pointer-events:none;opacity:.045;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>")}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:140;background:radial-gradient(ellipse at 50% 52%,transparent 28%,rgba(4,6,10,.5) 78%,rgba(0,0,2,.92) 100%)}
#scene{position:fixed;inset:0;z-index:10}

/* Veil */
#veil{position:fixed;inset:0;z-index:300;background:#020304;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;transition:opacity 2.4s cubic-bezier(.4,0,.2,1)}
#veil.gone{opacity:0;pointer-events:none}
#veil-text{font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:300;letter-spacing:.35em;color:rgba(200,210,230,.5);text-transform:lowercase}
#veil-bar{width:140px;height:1px;background:rgba(200,210,230,.08);overflow:hidden;position:relative}
#veil-bar::after{content:'';position:absolute;inset:0;width:var(--p,0%);background:linear-gradient(90deg,transparent,rgba(255,180,100,.9),transparent);transition:width .5s ease}
#veil-line{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:rgba(200,210,230,.25);letter-spacing:.04em;text-align:center;padding:0 30px;opacity:0;transition:opacity 1.6s ease 1s;max-width:520px;line-height:1.5}
#veil.show-line #veil-line{opacity:1}

/* The small return link */
#return{
  position:fixed;
  top:28px;
  right:32px;
  z-index:50;
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;
  font-weight:300;
  letter-spacing:.28em;
  color:rgba(220,210,190,.22);
  text-decoration:none;
  text-transform:lowercase;
  padding:10px 14px;
  transition:color 1.4s ease,letter-spacing 1.4s ease;
  opacity:0;
  animation:returnFade 3s ease 4s forwards;
}
#return:hover{color:rgba(255,216,168,.78);letter-spacing:.34em}
@keyframes returnFade{to{opacity:1}}

/* Ambient text bottom-left */
#ambient{
  position:fixed;
  bottom:28px;
  left:32px;
  z-index:50;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:300;
  font-size:.95rem;
  letter-spacing:.03em;
  color:rgba(220,210,190,0);
  max-width:320px;
  line-height:1.5;
  transition:color 4s ease;
  pointer-events:none;
}
#ambient.on{color:rgba(220,210,190,.36)}

/* Clock bottom-right, quiet */
#clock{
  position:fixed;
  bottom:32px;
  right:32px;
  z-index:50;
  font-family:'JetBrains Mono',monospace;
  font-size:.58rem;
  font-weight:300;
  letter-spacing:.24em;
  color:rgba(220,210,190,0);
  text-transform:lowercase;
  pointer-events:none;
  transition:color 4s ease;
}
#clock.on{color:rgba(220,210,190,.22)}

@media(max-width:640px){
  #return{top:20px;right:20px;font-size:.54rem;letter-spacing:.22em}
  #ambient{bottom:20px;left:20px;font-size:.82rem;max-width:220px}
  #clock{bottom:20px;right:20px;font-size:.52rem}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="grain"></div>
<div id="vignette"></div>
<div id="scene"></div>

<a id="return" href="letter.html">← return to the letter</a>
<div id="ambient">drag to look around.<br>scroll to step nearer.<br>stay as long as you like.</div>
<div id="clock"></div>

<div id="veil">
  <div id="veil-text">arriving</div>
  <div id="veil-bar"></div>
  <div id="veil-line">everything here is temporary.<br>at the present moment it is everything.</div>
</div>

<script>
'use strict';
const W=()=>innerWidth,H=()=>innerHeight;

/* Clock */
function updClock(){
  const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m+' · alephata';
}
updClock();setInterval(updClock,20000);

/* ═════ MODEL CONFIG — verified orientations ═════ */
const MODEL_BASE=(location.hostname==='su7sh.com'||location.hostname==='www.su7sh.com')?'models/':'https://su7sh.com/models/';

const MODELS={
  monitor:{
    url:MODEL_BASE+'ultra-wide_monitor.glb',
    targetWidth:6.2,
    position:[0,1.42,-2.6],
    rotation:[0,-Math.PI/2,0]       // landscape, screen faces camera
  },
  macbook:{
    url:MODEL_BASE+'apple_macbook_pro.glb',
    targetWidth:2.2,
    position:[0,0.26,0.6],
    rotation:[0,0,0]                 // native — screen toward camera
  },
  keyboard:{
    url:MODEL_BASE+'apple_magic_keyboard_with_numeric_keyboard.glb',
    targetWidth:3.2,
    position:[-3.5,0.14,1.9],
    rotation:[0,0,0]
  },
  mouse:{
    url:MODEL_BASE+'logitech_g502_x_lightspeed.glb',
    targetWidth:0.85,
    position:[2.6,0.14,1.7],
    rotation:[0,0,0],
    tint:0x8a5a32                    // warm aged copper
  },
  iphone:{
    url:MODEL_BASE+'iphone_14_pro_silver.glb',
    targetWidth:0.75,
    position:[1.2,0.16,2.25],
    rotation:[-Math.PI/2,Math.PI,0]  // flat, screen up
  }
};

let scene,camera,renderer,controls,clock=new THREE.Clock();
let idleTimer=null;
let lampLight=null,iphoneGlow=null,motes=null,moonLight=null;
let loaded={};
let baseCamPos=new THREE.Vector3(0,3.0,8.2);
let baseCamLook=new THREE.Vector3(0,1.4,-0.6);

/* Environment map */
function makeEnv(){
  const c=document.createElement('canvas');c.width=2048;c.height=1024;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,1024);
  g.addColorStop(0,'#0a1020');g.addColorStop(.4,'#120d18');g.addColorStop(.55,'#1f1008');g.addColorStop(.75,'#0a0404');g.addColorStop(1,'#020202');
  x.fillStyle=g;x.fillRect(0,0,2048,1024);
  [[350,300,280,'rgba(255,170,80,.75)'],[1700,360,200,'rgba(70,110,180,.4)'],[1200,420,140,'rgba(255,140,70,.35)']].forEach(([cx,cy,r,col])=>{
    const rg=x.createRadialGradient(cx,cy,0,cx,cy,r);
    rg.addColorStop(0,col);rg.addColorStop(.5,col.replace(/[\d.]+\)/,'.2)'));rg.addColorStop(1,'transparent');
    x.fillStyle=rg;x.fillRect(cx-r,cy-r,r*2,r*2);
  });
  const gr=x.createLinearGradient(0,512,0,1024);gr.addColorStop(0,'rgba(18,12,6,0)');gr.addColorStop(1,'rgba(4,3,1,.92)');x.fillStyle=gr;x.fillRect(0,512,2048,512);
  const tex=new THREE.CanvasTexture(c);tex.mapping=THREE.EquirectangularReflectionMapping;tex.encoding=THREE.sRGBEncoding;return tex;
}

function loadWood(cb){
  const ldr=new THREE.TextureLoader();
  ldr.setCrossOrigin('anonymous');
  ldr.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/hardwood2_diffuse.jpg',
    (tex)=>{tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(3,1.5);tex.encoding=THREE.sRGBEncoding;tex.anisotropy=4;cb(tex)},
    undefined,
    ()=>{const c=document.createElement('canvas');c.width=512;c.height=512;const x=c.getContext('2d');x.fillStyle='#a07848';x.fillRect(0,0,512,512);for(let i=0;i<80;i++){const y=i*6.4;x.strokeStyle=`rgba(${Math.random()<.5?80:150},60,30,${.1+Math.random()*.2})`;x.lineWidth=.5+Math.random()*1.4;x.beginPath();x.moveTo(0,y);let cx=0,cy=y;while(cx<512){const nx=cx+30+Math.random()*50,ny=y+(Math.random()-.5)*3;x.quadraticCurveTo(cx+15,cy,nx,ny);cx=nx;cy=ny}x.stroke()}const tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(3,1.5);cb(tex)}
  );
}

function buildScene(woodTex){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x04060a);
  scene.fog=new THREE.FogExp2(0x04060a,0.045);
  scene.environment=makeEnv();

  camera=new THREE.PerspectiveCamera(34,W()/H(),.1,100);
  camera.position.copy(baseCamPos);camera.lookAt(baseCamLook);

  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setSize(W(),H());renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
  renderer.outputEncoding=THREE.sRGBEncoding;
  document.getElementById('scene').appendChild(renderer.domElement);

  /* ─── OrbitControls — drag to rotate 360°, scroll/pinch to zoom ─── */
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.target.copy(baseCamLook);
  controls.enableDamping=true;
  controls.dampingFactor=0.08;
  controls.enablePan=false;
  controls.minDistance=3.5;
  controls.maxDistance=9.5;
  controls.minPolarAngle=1.08;               // keep viewer below the ceiling
  controls.maxPolarAngle=Math.PI*0.55;       // don't slip under the floor
  controls.rotateSpeed=0.65;
  controls.zoomSpeed=0.75;
  controls.autoRotate=true;
  controls.autoRotateSpeed=0.35;             // very slow drift when idle
  controls.addEventListener('start',()=>{
    controls.autoRotate=false;
    if(idleTimer){clearTimeout(idleTimer);idleTimer=null}
  });
  controls.addEventListener('end',()=>{
    if(idleTimer)clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{controls.autoRotate=true},5000);
  });

  /* Lighting — restrained */
  scene.add(new THREE.HemisphereLight(0x8090a8,0x080604,.28));

  lampLight=new THREE.SpotLight(0xffb06a,1.3,22,Math.PI*.38,.7,1.3);
  lampLight.position.set(-5.5,6.5,5);
  lampLight.target.position.set(-0.3,.4,1);
  lampLight.castShadow=true;
  lampLight.shadow.mapSize.set(1024,1024);
  lampLight.shadow.bias=-.0003;lampLight.shadow.normalBias=.014;
  scene.add(lampLight,lampLight.target);

  const fill=new THREE.DirectionalLight(0x5070a0,.28);
  fill.position.set(5,5,2);scene.add(fill);

  const warmPocket=new THREE.PointLight(0xffa66a,.28,5,2);
  warmPocket.position.set(-1,1.5,2.5);scene.add(warmPocket);

  /* Desk */
  const desk=new THREE.Mesh(
    new THREE.BoxGeometry(15,.2,7.5),
    new THREE.MeshStandardMaterial({map:woodTex,color:0xa89078,metalness:.05,roughness:.68,envMapIntensity:.6})
  );
  desk.receiveShadow=true;scene.add(desk);

  const lip=new THREE.Mesh(new THREE.BoxGeometry(15,.04,.04),new THREE.MeshStandardMaterial({color:0x5a3e24,roughness:.55}));
  lip.position.set(0,.12,3.75);scene.add(lip);

  /* Desk mat */
  const mat=new THREE.Mesh(
    new THREE.BoxGeometry(4.8,.018,2.5),
    new THREE.MeshStandardMaterial({color:0x0a0b0e,roughness:.92,metalness:.05,envMapIntensity:.25})
  );
  mat.position.set(0,.119,1.6);mat.receiveShadow=true;scene.add(mat);

  /* Riser */
  const riser=new THREE.Mesh(
    new THREE.BoxGeometry(3.6,.22,1.4),
    new THREE.MeshStandardMaterial({color:0x1a1e24,metalness:.55,roughness:.4,envMapIntensity:.85})
  );
  riser.position.set(0,.23,-2.0);riser.castShadow=true;riser.receiveShadow=true;scene.add(riser);
  [-1.6,1.6].forEach(x=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(.08,.22,1.28),new THREE.MeshStandardMaterial({color:0x0e1014,metalness:.7,roughness:.3}));
    leg.position.set(x,.23,-2.0);scene.add(leg);
  });

  /* ══════════════ ROOM ENCLOSURE ══════════════
     room bounds — x:[-10,10]  y:[-2.2, 6]  z:[-12, 10]
     left wall has a window  (winY 0.4–3.4, winZ -3.2–0.8)
  */
  const ROOM={xMin:-10,xMax:10,yMin:-2.2,yMax:6,zMin:-12,zMax:10};
  const wallMat=new THREE.MeshStandardMaterial({color:0x0b0f16,roughness:.96,metalness:.02,envMapIntensity:.22});
  const wallWarm=new THREE.MeshStandardMaterial({color:0x121014,roughness:.94,metalness:.02,envMapIntensity:.2});
  const thk=0.2;
  const cxZ=(ROOM.zMin+ROOM.zMax)/2, cyY=(ROOM.yMin+ROOM.yMax)/2;
  const roomW=ROOM.xMax-ROOM.xMin, roomH=ROOM.yMax-ROOM.yMin, roomD=ROOM.zMax-ROOM.zMin;

  /* floor — expand to fit new room */
  const floor=new THREE.Mesh(
    new THREE.PlaneGeometry(roomW,roomD),
    new THREE.MeshStandardMaterial({color:0x0a0806,roughness:.82,metalness:.06,envMapIntensity:.28})
  );
  floor.rotation.x=-Math.PI/2;floor.position.set(0,ROOM.yMin,cxZ);floor.receiveShadow=true;scene.add(floor);

  /* back wall */
  const backWall=new THREE.Mesh(new THREE.BoxGeometry(roomW,roomH,thk),wallWarm);
  backWall.position.set(0,cyY,ROOM.zMin-thk/2);backWall.receiveShadow=true;scene.add(backWall);

  /* front wall */
  const frontWall=new THREE.Mesh(new THREE.BoxGeometry(roomW,roomH,thk),wallMat);
  frontWall.position.set(0,cyY,ROOM.zMax+thk/2);frontWall.receiveShadow=true;scene.add(frontWall);

  /* right wall */
  const rightWall=new THREE.Mesh(new THREE.BoxGeometry(thk,roomH,roomD),wallMat);
  rightWall.position.set(ROOM.xMax+thk/2,cyY,cxZ);rightWall.receiveShadow=true;scene.add(rightWall);

  /* ceiling */
  const ceiling=new THREE.Mesh(
    new THREE.BoxGeometry(roomW,thk,roomD),
    new THREE.MeshStandardMaterial({color:0x06080c,roughness:.98,metalness:.02,envMapIntensity:.1})
  );
  ceiling.position.set(0,ROOM.yMax+thk/2,cxZ);ceiling.receiveShadow=true;scene.add(ceiling);

  /* ══════ LEFT WALL with WINDOW — 4 panels around a hole ══════ */
  const win={y0:0.4,y1:3.4,z0:-3.2,z1:0.8};
  const LX=ROOM.xMin-thk/2;
  // below window
  { const h=win.y0-ROOM.yMin;
    const m=new THREE.Mesh(new THREE.BoxGeometry(thk,h,roomD),wallMat);
    m.position.set(LX,ROOM.yMin+h/2,cxZ);m.receiveShadow=true;scene.add(m); }
  // above window
  { const h=ROOM.yMax-win.y1;
    const m=new THREE.Mesh(new THREE.BoxGeometry(thk,h,roomD),wallMat);
    m.position.set(LX,win.y1+h/2,cxZ);m.receiveShadow=true;scene.add(m); }
  // toward back (lower z)
  { const d=win.z0-ROOM.zMin, h=win.y1-win.y0;
    const m=new THREE.Mesh(new THREE.BoxGeometry(thk,h,d),wallMat);
    m.position.set(LX,(win.y0+win.y1)/2,ROOM.zMin+d/2);m.receiveShadow=true;scene.add(m); }
  // toward front (higher z)
  { const d=ROOM.zMax-win.z1, h=win.y1-win.y0;
    const m=new THREE.Mesh(new THREE.BoxGeometry(thk,h,d),wallMat);
    m.position.set(LX,(win.y0+win.y1)/2,win.z1+d/2);m.receiveShadow=true;scene.add(m); }

  /* window muntins (interior cross) */
  const muntinMat=new THREE.MeshStandardMaterial({color:0x1a1a20,roughness:.45,metalness:.4});
  const muntinH=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.08,win.z1-win.z0-0.04),muntinMat);
  muntinH.position.set(ROOM.xMin+0.05,(win.y0+win.y1)/2,(win.z0+win.z1)/2);scene.add(muntinH);
  const muntinV=new THREE.Mesh(new THREE.BoxGeometry(0.1,win.y1-win.y0-0.04,0.08),muntinMat);
  muntinV.position.set(ROOM.xMin+0.05,(win.y0+win.y1)/2,(win.z0+win.z1)/2);scene.add(muntinV);

  /* sky beyond the window — night gradient + stars + faint horizon */
  const skyTex=(()=>{
    const c=document.createElement('canvas');c.width=256;c.height=256;
    const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,0,256);
    g.addColorStop(0,'#1e2a4a');g.addColorStop(.45,'#0c1530');g.addColorStop(1,'#060a18');
    x.fillStyle=g;x.fillRect(0,0,256,256);
    for(let i=0;i<70;i++){const sx=Math.random()*256,sy=Math.random()*190;
      const a=.2+Math.random()*.6;x.fillStyle=`rgba(230,235,245,${a})`;
      x.fillRect(sx,sy,1,1);
      if(Math.random()<.15){x.fillStyle=`rgba(230,235,245,${a*.4})`;
        x.fillRect(sx-1,sy,3,1);x.fillRect(sx,sy-1,1,3);}}
    x.fillStyle='#020406';x.fillRect(0,215,256,41);
    const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;return t;
  })();
  const sky=new THREE.Mesh(
    new THREE.PlaneGeometry(win.z1-win.z0+1.2,win.y1-win.y0+1.2),
    new THREE.MeshBasicMaterial({map:skyTex})
  );
  sky.rotation.y=Math.PI/2;
  sky.position.set(LX-0.5,(win.y0+win.y1)/2,(win.z0+win.z1)/2);
  scene.add(sky);

  /* moonlight streaming through window — cool blue directional */
  moonLight=new THREE.DirectionalLight(0xb0c6e8,0.65);
  moonLight.position.set(-14,4.2,-1);
  moonLight.target.position.set(2,0,1.5);
  moonLight.castShadow=true;
  moonLight.shadow.mapSize.set(1024,1024);
  moonLight.shadow.camera.left=-8;moonLight.shadow.camera.right=8;
  moonLight.shadow.camera.top=5;moonLight.shadow.camera.bottom=-3;
  moonLight.shadow.camera.near=1;moonLight.shadow.camera.far=28;
  moonLight.shadow.bias=-.0003;moonLight.shadow.normalBias=.014;
  scene.add(moonLight,moonLight.target);

  /* ══════════════ RUG (under desk) ══════════════ */
  const rugTex=(()=>{
    const c=document.createElement('canvas');c.width=512;c.height=256;const x=c.getContext('2d');
    x.fillStyle='#3a1a18';x.fillRect(0,0,512,256);
    // faded pattern
    x.strokeStyle='rgba(120,55,40,.25)';x.lineWidth=1;
    for(let i=0;i<60;i++){x.beginPath();const sx=Math.random()*512;x.moveTo(sx,0);x.lineTo(sx+(Math.random()-.5)*20,256);x.stroke();}
    // diamond lozenges
    x.strokeStyle='rgba(180,90,60,.3)';x.lineWidth=1.2;
    for(let j=0;j<3;j++){for(let i=0;i<6;i++){x.beginPath();
      x.moveTo(60+i*80,40+j*70);x.lineTo(100+i*80,80+j*70);
      x.lineTo(60+i*80,120+j*70);x.lineTo(20+i*80,80+j*70);x.closePath();x.stroke();}}
    // dark border
    x.fillStyle='#241010';x.fillRect(0,0,512,18);x.fillRect(0,238,512,18);
    x.fillRect(0,0,18,256);x.fillRect(494,0,18,256);
    const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;t.anisotropy=4;return t;
  })();
  const rug=new THREE.Mesh(
    new THREE.BoxGeometry(9.5,.04,5.6),
    new THREE.MeshStandardMaterial({map:rugTex,roughness:.92,metalness:0,envMapIntensity:.2})
  );
  rug.position.set(0,ROOM.yMin+.022,1.3);rug.receiveShadow=true;scene.add(rug);

  /* ══════════════ CHAIR (viewer-side of desk) ══════════════ */
  const chairLeather=new THREE.MeshStandardMaterial({color:0x181418,roughness:.62,metalness:.12,envMapIntensity:.6});
  const chairMetal=new THREE.MeshStandardMaterial({color:0x08080a,metalness:.7,roughness:.35});
  const chair=new THREE.Group();
  const seat=new THREE.Mesh(new THREE.BoxGeometry(1.5,.14,1.3),chairLeather);
  seat.position.y=1.0;seat.castShadow=true;seat.receiveShadow=true;chair.add(seat);
  const back=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.7,.12),chairLeather);
  back.position.set(0,1.85,-.6);back.castShadow=true;back.receiveShadow=true;chair.add(back);
  [[-.65,-.55],[.65,-.55],[-.65,.55],[.65,.55]].forEach(([lx,lz])=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(.08,1.0,.08),chairMetal);
    leg.position.set(lx,.5,lz);leg.castShadow=true;chair.add(leg);
  });
  chair.position.set(0,ROOM.yMin,3.3);
  scene.add(chair);

  /* ══════════════ LAMP FIXTURE (motivates the warm light) ══════════════ */
  const lampGroup=new THREE.Group();
  const lampBase=new THREE.Mesh(
    new THREE.CylinderGeometry(.34,.4,.08,18),
    new THREE.MeshStandardMaterial({color:0x1e1510,metalness:.75,roughness:.38})
  );
  lampBase.position.y=.04;lampBase.castShadow=true;lampGroup.add(lampBase);
  const lampStem=new THREE.Mesh(
    new THREE.CylinderGeometry(.04,.04,1.9,8),
    new THREE.MeshStandardMaterial({color:0x14100a,metalness:.82,roughness:.3})
  );
  lampStem.position.y=1.03;lampStem.castShadow=true;lampGroup.add(lampStem);
  const lampShade=new THREE.Mesh(
    new THREE.CylinderGeometry(.4,.55,.55,18,1,true),
    new THREE.MeshStandardMaterial({color:0xbb8454,roughness:.55,metalness:.15,emissive:0xff9848,emissiveIntensity:.35,side:THREE.DoubleSide})
  );
  lampShade.position.y=2.2;lampGroup.add(lampShade);
  const bulb=new THREE.Mesh(
    new THREE.SphereGeometry(.13,10,8),
    new THREE.MeshBasicMaterial({color:0xffc98a})
  );
  bulb.position.y=2.15;lampGroup.add(bulb);
  lampGroup.position.set(-5.2,ROOM.yMin+.22,-1.8);
  scene.add(lampGroup);

  // retarget the existing warm spotlight so it emanates from this lamp
  lampLight.position.set(-5.2,ROOM.yMin+2.15,-1.8);
  lampLight.target.position.set(-0.3,.4,.5);
  // also add a small point light inside the shade for ambient glow
  const lampPt=new THREE.PointLight(0xffb878,.55,3.5,2);
  lampPt.position.set(-5.2,ROOM.yMin+2.15,-1.8);
  scene.add(lampPt);

  /* ══════════════ BOOKS (small stack on desk) ══════════════ */
  const bookColors=[0x3a2818,0x5a3a1c,0x241418,0x2a1a22];
  const bookStack=new THREE.Group();
  bookColors.forEach((col,i)=>{
    const b=new THREE.Mesh(
      new THREE.BoxGeometry(.95,.1,.62),
      new THREE.MeshStandardMaterial({color:col,roughness:.82,metalness:0})
    );
    b.position.y=.05+i*.11;b.castShadow=true;b.receiveShadow=true;
    b.rotation.y=(i%2)*.04;
    bookStack.add(b);
  });
  bookStack.position.set(4.6,.12,-1.6);
  bookStack.rotation.y=.22;
  scene.add(bookStack);

  /* ══════════════ MUG on desk (warm ceramic) ══════════════ */
  const mugMat=new THREE.MeshStandardMaterial({color:0xe4dcc8,roughness:.45,metalness:.08,envMapIntensity:.8});
  const mug=new THREE.Group();
  const mugBody=new THREE.Mesh(new THREE.CylinderGeometry(.16,.14,.34,18),mugMat);
  mugBody.position.y=.17;mugBody.castShadow=true;mug.add(mugBody);
  // dark coffee surface
  const coffee=new THREE.Mesh(
    new THREE.CircleGeometry(.148,18),
    new THREE.MeshStandardMaterial({color:0x1a0c06,roughness:.2,metalness:.4,envMapIntensity:.9})
  );
  coffee.rotation.x=-Math.PI/2;coffee.position.y=.335;mug.add(coffee);
  // handle
  const handle=new THREE.Mesh(new THREE.TorusGeometry(.1,.022,8,18,Math.PI),mugMat);
  handle.rotation.z=Math.PI/2;handle.position.set(.16,.18,0);mug.add(handle);
  mug.position.set(3.6,.12,1.2);
  scene.add(mug);

  /* ══════════════ NOTEBOOK on desk ══════════════ */
  const notebook=new THREE.Mesh(
    new THREE.BoxGeometry(1.2,.08,.88),
    new THREE.MeshStandardMaterial({color:0x141014,roughness:.55,metalness:.12,envMapIntensity:.5})
  );
  notebook.position.set(-2.5,.16,1.45);notebook.rotation.y=-.12;
  notebook.castShadow=true;notebook.receiveShadow=true;
  scene.add(notebook);

  /* ══════════════ WALL PICTURE (back wall, right side) ══════════════ */
  const picTex=(()=>{
    const c=document.createElement('canvas');c.width=128;c.height=96;const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,0,96);
    g.addColorStop(0,'#2a1d10');g.addColorStop(.4,'#1a1830');g.addColorStop(1,'#060814');
    x.fillStyle=g;x.fillRect(0,0,128,96);
    x.fillStyle='#040508';x.fillRect(0,66,128,30);
    const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;return t;
  })();
  const picFrame=new THREE.Group();
  const frame=new THREE.Mesh(
    new THREE.BoxGeometry(1.9,1.3,.06),
    new THREE.MeshStandardMaterial({color:0x2a1c12,metalness:.3,roughness:.52})
  );
  picFrame.add(frame);
  const picCanvas=new THREE.Mesh(
    new THREE.PlaneGeometry(1.7,1.1),
    new THREE.MeshBasicMaterial({map:picTex})
  );
  picCanvas.position.z=.032;picFrame.add(picCanvas);
  picFrame.position.set(5.5,2.3,ROOM.zMin+thk+0.02);
  scene.add(picFrame);

  /* ══════════════ DUST MOTES (particles, caught in light) ══════════════ */
  const moteCount=140;
  const motePos=new Float32Array(moteCount*3);
  for(let i=0;i<moteCount;i++){
    motePos[i*3]=(Math.random()-.5)*14;
    motePos[i*3+1]=Math.random()*4.2+0.3;
    motePos[i*3+2]=(Math.random()-.5)*10-1;
  }
  const moteGeo=new THREE.BufferGeometry();
  moteGeo.setAttribute('position',new THREE.BufferAttribute(motePos,3));
  const moteMat=new THREE.PointsMaterial({
    color:0xffd8a8,size:0.035,transparent:true,opacity:.55,
    sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false
  });
  motes=new THREE.Points(moteGeo,moteMat);
  scene.add(motes);

  addEventListener('resize',onResize);
}

function loadAll(onDone){
  const loader=new THREE.GLTFLoader();
  const keys=Object.keys(MODELS);
  function next(i){
    if(i>=keys.length){onDone();return}
    const name=keys[i],cfg=MODELS[name];
    updateVeil(i/keys.length);
    loader.load(cfg.url,gltf=>{
      const root=gltf.scene;
      root.rotation.set(...cfg.rotation);root.updateMatrixWorld(true);
      const bbox=new THREE.Box3().setFromObject(root);
      const size=bbox.getSize(new THREE.Vector3());
      const maxDim=Math.max(size.x,size.y,size.z);
      const fit=cfg.targetWidth/Math.max(maxDim,.001);
      root.scale.setScalar(fit);root.updateMatrixWorld(true);
      const bbox2=new THREE.Box3().setFromObject(root);
      const center=bbox2.getCenter(new THREE.Vector3());
      const minY=bbox2.min.y;
      root.position.sub(new THREE.Vector3(center.x,minY,center.z));
      root.position.add(new THREE.Vector3(...cfg.position));
      root.traverse(o=>{
        if(o.isMesh){
          o.castShadow=true;o.receiveShadow=true;
          if(o.material){
            const mats=Array.isArray(o.material)?o.material:[o.material];
            mats.forEach(m=>{
              if(m.envMapIntensity!==undefined)m.envMapIntensity=1.1;
              if(cfg.tint!==undefined&&m.color){
                m.color=new THREE.Color(cfg.tint);
                m.metalness=0.7;
                m.roughness=0.45;
              }
              m.needsUpdate=true;
            });
          }
        }
      });
      loaded[name]=root;scene.add(root);
      next(i+1);
    },undefined,err=>{console.warn('fail',name,err);next(i+1)});
  }
  next(0);
}

function updateVeil(pct){
  document.getElementById('veil-bar').style.setProperty('--p',Math.round(pct*100)+'%');
  if(pct>.5&&!document.getElementById('veil').classList.contains('show-line'))document.getElementById('veil').classList.add('show-line');
}

function onResize(){camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H())}

/* Animation — controls-driven, with gentle life in lamp and iphone */
let tC=0;
function tick(){
  const dt=Math.min(clock.getDelta(),.1);tC+=dt;
  if(controls)controls.update();
  // Lamp — subtle oil-lamp flicker
  if(lampLight)lampLight.intensity=1.3+Math.sin(tC*2.1)*.028+Math.sin(tC*13.7)*.014;
  // iPhone — very slow gentle pulse, like a heartbeat
  if(iphoneGlow)iphoneGlow.intensity=.35+Math.sin(tC*0.8)*.18;
  // Dust motes — slow upward drift, reset on exit
  if(motes){
    const p=motes.geometry.attributes.position;
    const a=p.array;
    for(let i=0;i<p.count;i++){
      a[i*3+1]+=0.004+Math.sin(tC*0.3+i*0.5)*0.0012;
      a[i*3]  +=Math.sin(tC*0.15+i*0.7)*0.0018;
      a[i*3+2]+=Math.cos(tC*0.12+i*0.4)*0.0014;
      if(a[i*3+1]>5.2){a[i*3+1]=0.2;a[i*3]=(Math.random()-.5)*14;a[i*3+2]=(Math.random()-.5)*10-1;}
    }
    p.needsUpdate=true;
  }
  if(renderer&&scene&&camera)renderer.render(scene,camera);
  requestAnimationFrame(tick);
}

/* Init */
loadWood(woodTex=>{
  buildScene(woodTex);
  loadAll(()=>{
    if(loaded.iphone){
      iphoneGlow=new THREE.PointLight(0xffc678,.35,1.5,2);
      iphoneGlow.position.set(MODELS.iphone.position[0],MODELS.iphone.position[1]+.35,MODELS.iphone.position[2]);
      scene.add(iphoneGlow);
    }
    updateVeil(1);
    setTimeout(()=>{
      document.getElementById('veil').classList.add('gone');
      setTimeout(()=>document.getElementById('veil').style.display='none',2500);
      document.getElementById('ambient').classList.add('on');
      document.getElementById('clock').classList.add('on');
    },900);
  });
  tick();
});
