<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#04060a;overflow:hidden;user-select:none;-webkit-user-select:none;font-family:'Cormorant Garamond',Georgia,serif;color:#dfe6f0}
canvas{display:block}

#grain{position:fixed;inset:0;z-index:150;pointer-events:none;opacity:.045;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>")}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:140;background:radial-gradient(ellipse at 50% 52%,transparent 28%,rgba(4,6,10,.5) 78%,rgba(0,0,2,.92) 100%)}
#scene{position:fixed;inset:0;z-index:10}

/* Veil */
#veil{position:fixed;inset:0;z-index:300;background:#020304;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;transition:opacity 2.4s cubic-bezier(.4,0,.2,1)}
#veil.gone{opacity:0;pointer-events:none}
#veil-text{font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:300;letter-spacing:.35em;color:rgba(200,210,230,.5);text-transform:lowercase}
#veil-bar{width:140px;height:1px;background:rgba(200,210,230,.08);overflow:hidden;position:relative}
#veil-bar::after{content:'';position:absolute;inset:0;width:var(--p,0%);background:linear-gradient(90deg,transparent,rgba(255,180,100,.9),transparent);transition:width .5s ease}
#veil-line{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:rgba(200,210,230,.25);letter-spacing:.04em;text-align:center;padding:0 30px;opacity:0;transition:opacity 1.6s ease 1s;max-width:520px;line-height:1.5}
#veil.show-line #veil-line{opacity:1}

/* ─── iOS Lock Screen — full-viewport, wallpaper-backed ─── */
#lock-overlay{
  position:fixed;inset:0;z-index:200;display:none;
  background:#000;
  background-image:url('models/wallpaper.jpg');
  background-size:cover;background-position:center;
  opacity:0;transition:opacity .55s ease-out;
  flex-direction:column;align-items:center;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  color:#fff;
  overflow:hidden;
}
#lock-overlay.show{display:flex;opacity:1}
#lock-overlay::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,.15) 35%,rgba(0,0,0,.15) 65%,rgba(0,0,0,.55) 100%);
  pointer-events:none;
}
#lock-overlay > *{position:relative;z-index:1}

/* Status bar — time left, indicators right */
.ios-status{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:14px 32px 0;font-size:17px;font-weight:600;letter-spacing:-.01em;
  flex-shrink:0;
}
.ios-status .si-time{font-variant-numeric:tabular-nums}
.ios-status .si-icons{display:inline-flex;align-items:center;gap:6px}
.ios-status .si-icons svg{display:block}

/* Big clock and date */
.ios-clock-block{
  margin-top:34px;text-align:center;flex-shrink:0;
  text-shadow:0 2px 18px rgba(0,0,0,.35);
}
.ios-date{
  font-size:16px;font-weight:600;letter-spacing:.01em;
  opacity:.95;margin-bottom:-4px;
}
.ios-clock{
  font-size:84px;font-weight:300;letter-spacing:-.04em;line-height:1;
  font-variant-numeric:tabular-nums;
}

/* Lock glyph + Enter Passcode label */
.ios-padlock{
  margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:14px;
  flex-shrink:0;
}
.ios-padlock-icon{width:30px;height:30px;opacity:.95;transition:transform .35s cubic-bezier(.2,.9,.2,1)}
.ios-padlock-icon.unlocked{transform:translateY(-2px) scale(1.05)}
.ios-padlock-label{font-size:14px;font-weight:400;letter-spacing:.01em;opacity:.9}

/* Six dots */
.ios-dots{
  margin-top:18px;display:flex;gap:22px;justify-content:center;flex-shrink:0;
}
.ios-dots span{
  width:13px;height:13px;border-radius:50%;
  border:1.4px solid rgba(255,255,255,.85);
  transition:background .15s ease-out, transform .15s ease-out;
}
.ios-dots span.filled{background:#fff}
.ios-dots.shake{animation:ios-shake .42s cubic-bezier(.36,.07,.19,.97)}
@keyframes ios-shake{
  10%,90%{transform:translateX(-3px)}
  20%,80%{transform:translateX(6px)}
  30%,50%,70%{transform:translateX(-10px)}
  40%,60%{transform:translateX(10px)}
}

/* iOS keypad — 3x4, with letters under digits */
.ios-keypad{
  margin:36px 0 56px;
  display:grid;grid-template-columns:repeat(3,78px);gap:14px 28px;
  justify-content:center;flex-shrink:0;
}
.ios-key{
  width:78px;height:78px;border-radius:50%;border:none;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;font-family:inherit;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:0;
  transition:background .12s ease-out,transform .08s ease-out;
}
.ios-key:hover{background:rgba(255,255,255,.26)}
.ios-key:active{background:rgba(255,255,255,.42);transform:scale(.96)}
.ios-key .ios-num{font-size:36px;font-weight:300;line-height:1;letter-spacing:-.01em}
.ios-key .ios-letters{font-size:10px;font-weight:600;letter-spacing:.18em;opacity:.95;height:11px}
.ios-key.spacer{visibility:hidden;pointer-events:none}
.ios-key.action{background:transparent;font-size:15px;font-weight:400}
.ios-key.action:hover{background:transparent;text-decoration:underline}

/* Pre-unlock floating hint */
#phone-hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:60;font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;color:rgba(255,255,255,.5);letter-spacing:.05em;pointer-events:none;opacity:0;transition:opacity 1.2s ease-out 1s;text-align:center}
#phone-hint.on{opacity:1}
#phone-hint::after{content:'';display:block;margin:10px auto 0;width:22px;height:1px;background:rgba(255,255,255,.18)}

/* Terminal overlay — click the monitor to summon */
#terminal-overlay{position:fixed;inset:0;z-index:190;display:none;align-items:center;justify-content:center;background:rgba(4,6,10,.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;transition:opacity .25s ease-out}
#terminal-overlay.show{display:flex;opacity:1}
.terminal-panel{width:min(640px,92vw);height:min(440px,70vh);background:rgba(8,9,12,.97);border:1px solid rgba(255,255,255,.08);border-radius:10px;box-shadow:0 30px 90px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;transform:scale(.96);opacity:0;transition:transform .3s cubic-bezier(.2,.9,.2,1),opacity .3s ease-out;font-family:'JetBrains Mono',monospace}
#terminal-overlay.show .terminal-panel{transform:scale(1);opacity:1}
.terminal-header{display:flex;align-items:center;gap:6px;padding:9px 13px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.05)}
.terminal-dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.terminal-dot.red{background:#ff5f56}
.terminal-dot.yellow{background:#ffbd2e}
.terminal-dot.green{background:#27c93f}
.terminal-title{margin-left:14px;font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.04em}
.terminal-body{flex:1;padding:14px 16px;overflow-y:auto;font-size:13px;line-height:1.55;color:#cfd4da;white-space:pre-wrap;word-break:break-word}
.terminal-body::-webkit-scrollbar{width:6px}
.terminal-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.terminal-line{margin:0}
.terminal-line.user{color:#e4e8ee}
.terminal-line.system{color:#7ea3c8}
.terminal-line.error{color:#e38b8b}
.terminal-line.muted{color:rgba(207,212,218,.55)}
.terminal-input-line{display:flex;align-items:center;gap:8px;padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.05)}
.terminal-prompt{color:#8fbcd4;font-size:13px;font-weight:500}
#terminal-input{flex:1;background:transparent;border:none;outline:none;color:#e4e8ee;font-family:inherit;font-size:13px;caret-color:#8fbcd4}

/* The small return link */
#return{
  position:fixed;
  top:28px;
  right:32px;
  z-index:50;
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;
  font-weight:300;
  letter-spacing:.28em;
  color:rgba(220,210,190,.22);
  text-decoration:none;
  text-transform:lowercase;
  padding:10px 14px;
  transition:color 1.4s ease,letter-spacing 1.4s ease;
  opacity:0;
  animation:returnFade 3s ease 4s forwards;
}
#return:hover{color:rgba(255,216,168,.78);letter-spacing:.34em}
@keyframes returnFade{to{opacity:1}}

/* Ambient text bottom-left */
#ambient{
  position:fixed;
  bottom:28px;
  left:32px;
  z-index:50;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:300;
  font-size:.95rem;
  letter-spacing:.03em;
  color:rgba(220,210,190,0);
  max-width:320px;
  line-height:1.5;
  transition:color 4s ease;
  pointer-events:none;
}
#ambient.on{color:rgba(220,210,190,.36)}

/* Clock bottom-right, quiet */
#clock{
  position:fixed;
  bottom:32px;
  right:32px;
  z-index:50;
  font-family:'JetBrains Mono',monospace;
  font-size:.58rem;
  font-weight:300;
  letter-spacing:.24em;
  color:rgba(220,210,190,0);
  text-transform:lowercase;
  pointer-events:none;
  transition:color 4s ease;
}
#clock.on{color:rgba(220,210,190,.22)}

@media(max-width:640px){
  #return{top:20px;right:20px;font-size:.54rem;letter-spacing:.22em}
  #ambient{bottom:20px;left:20px;font-size:.82rem;max-width:220px}
  #clock{bottom:20px;right:20px;font-size:.52rem}
}
</style>

<script>
'use strict';
const W=()=>innerWidth,H=()=>innerHeight;

/* Clock */
function updClock(){
  const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m+' · alephata';
}
updClock();setInterval(updClock,20000);

/* ═════ MODEL CONFIG — verified orientations ═════ */
const MODEL_BASE=(location.hostname==='su7sh.com'||location.hostname==='www.su7sh.com')?'models/':'https://su7sh.com/models/';

const MODELS={
  monitor:{
    url:MODEL_BASE+'ultra-wide_monitor.glb',
    targetWidth:6.2,
    position:[0,1.42,-2.6],
    rotation:[0,-Math.PI/2,0]       // landscape, screen faces camera
  },
  macbook:{
    url:MODEL_BASE+'apple_macbook_pro.glb',
    targetWidth:2.2,
    position:[0,0.26,0.6],
    rotation:[0,0,0]                 // native — screen toward camera
  },
  keyboard:{
    url:MODEL_BASE+'apple_magic_keyboard_with_numeric_keyboard.glb',
    targetWidth:3.2,
    position:[-3.5,0.14,1.9],
    rotation:[0,0,0]
  },
  mouse:{
    url:MODEL_BASE+'logitech_g502_x_lightspeed.glb',
    targetWidth:0.85,
    position:[2.6,0.14,1.7],
    rotation:[0,0,0],
    tint:0x8a5a32                    // warm aged copper
  },
  iphone:{
    url:MODEL_BASE+'iphone_14_pro_silver.glb',
    targetWidth:0.75,
    position:[1.2,0.16,2.25],
    rotation:[-Math.PI/2,Math.PI,0]  // flat, screen up
  },
  // Mercedes — the display piece. Drop a GLB at models/mercedes.glb
  // Tweak targetWidth if the model is too big/small on the pedestal.
  // spin:true wraps it in a rotating pivot (see loadAll + tick).
  mercedes:{
    url:MODEL_BASE+'mercedes.glb',
    targetWidth:2.2,
    position:[4.2,0.165,0.8],
    rotation:[0,0,0],
    spin:true
  }
};

let scene,camera,renderer,controls,clock=new THREE.Clock();
let composer=null;
let idleTimer=null;
let lampLight=null,iphoneGlow=null,motes=null;
let flyInActive=false,flyInT=0;
const flyInDuration=4.8;
const flyInStartPos=new THREE.Vector3(-6,16,42);

/* ─── INTERACTIVE STATE ─── */
const raycaster=new THREE.Raycaster();
const mouseV2=new THREE.Vector2();

// preset camera tweening
let presetActive=false,presetT=0;
const PRESET_DURATION=1.6;
const presetStartPos=new THREE.Vector3();
const presetStartTarget=new THREE.Vector3();
const presetTargetPos=new THREE.Vector3();
const presetTargetTgt=new THREE.Vector3();

// cursor parallax
let cursorNX=0,cursorNY=0;
let parallaxX=0,parallaxY=0;
let parallaxAmp=0;        // 0 → 1 smoothly, kills jitter on engage/disengage
let isDragging=false;

// Mercedes interactions
let mercedesSpinning=true;
let mercedesSpinSpeed=0.28;
let paintIndex=0;
let originalPaintColors=null;

// ─── PASSCODE LOCK STATE ───
let isUnlocked=false;
let unlockCodeEntered='';
const CORRECT_CODE='777777';
const lockedObjects=[];             // renderables hidden pre-unlock
const dimmedLights=[];              // lights set to 0 intensity pre-unlock
let currentTweenDuration=PRESET_DURATION;  // preset = 1.6s; unlock overrides to ~4s
let unlockLightRampActive=false;
let unlockLightRampT=0;
const UNLOCK_LIGHT_RAMP_DURATION=3.5;
const PHONE_FOCUS_POS=new THREE.Vector3(2.3,1.6,4.8);
const PHONE_FOCUS_TGT=new THREE.Vector3(1.2,0.16,2.25);

// ─── MORSE-CODE LAMP ───
// the lamp flicker is a Morse pattern spelling a word; attentive visitors can decode it.
const MORSE_WORD='SUYASH';
const MORSE_MAP={A:'.-',H:'....',S:'...',U:'..-',Y:'-.--'};
const MORSE_UNIT=0.22;              // seconds per dot
const morsePattern=(()=>{
  const seq=[];
  const letters=MORSE_WORD.split('');
  letters.forEach((L,i)=>{
    const code=MORSE_MAP[L];
    code.split('').forEach((s,j)=>{
      seq.push({on:true, duration:(s==='.'?1:3)*MORSE_UNIT});
      if(j<code.length-1)seq.push({on:false, duration:1*MORSE_UNIT});
    });
    if(i<letters.length-1)seq.push({on:false, duration:3*MORSE_UNIT});
  });
  seq.push({on:false, duration:7*MORSE_UNIT});
  return seq;
})();
const MORSE_CYCLE=morsePattern.reduce((s,p)=>s+p.duration,0);

    rg.addColorStop(0,col);rg.addColorStop(.5,col.replace(/[\d.]+\)/,'.2)'));rg.addColorStop(1,'transparent');

/* ═══════════════ LOCK / UNLOCK HELPERS ═══════════════
   scene is locked on init: only the desk + phone + base lights are visible;
   all other objects are hidden and most lights dimmed to 0.
   passcode input happens through the HTML overlay (#lock-overlay).
   on correct code: reveal objects staggered + ramp lights + pull camera back.
*/
function lockScene(){
  scene.traverse(obj=>{
    if(obj===scene)return;
    // Hide renderables unless whitelisted
    if((obj.isMesh||obj.isPoints||obj.isLine)&&!obj.userData.preUnlockKeep){
      obj.visible=false;
      lockedObjects.push(obj);
    }
    // Dim lights unless whitelisted (keep: hemisphere, fill, iphoneGlow)
    if(obj.isLight&&!obj.userData.preUnlockKeep){
      obj.userData._origIntensity=obj.intensity;
      obj.intensity=0;
      dimmedLights.push(obj);
    }
  });
  console.log(`%c🔒 scene locked — ${lockedObjects.length} objects hidden, ${dimmedLights.length} lights dimmed`,'color:#f8a;font-weight:bold');
}

function raycastPhone(x,y){
  if(!loaded.iphone)return false;
  mouseV2.x=(x/W())*2-1;mouseV2.y=-(y/H())*2+1;
  raycaster.setFromCamera(mouseV2,camera);
  return raycaster.intersectObject(loaded.iphone,true).length>0;
}

function flyIntoPhone(){
  // Quick camera dolly-into-phone before the Lock Screen overlay appears.
  // The camera tween reuses the preset-tween machinery; on completion, lock overlay shows.
  if(presetActive||flyInActive)return;
  const phonePos=MODELS.iphone.position;
  // Target: very close to the phone, looking straight down at its screen
  presetStartPos.copy(camera.position);
  presetStartTarget.copy(controls.target);
  presetTargetPos.set(phonePos[0]+.05,phonePos[1]+.55,phonePos[2]+.05);
  presetTargetTgt.set(phonePos[0],phonePos[1],phonePos[2]);
  presetT=0;
  currentTweenDuration=0.7;          // quick, decisive entry
  presetActive=true;
  controls.enabled=false;
  controls.autoRotate=false;
  // Hide the hint as we begin the dive
  document.getElementById('phone-hint').classList.remove('on');

  setTimeout(showLockOverlay,560);
}

function showLockOverlay(){
  document.getElementById('lock-overlay').classList.add('show');
  document.getElementById('phone-hint').classList.remove('on');

}
function hideLockOverlay(){
  document.getElementById('lock-overlay').classList.remove('show');
}
function updateLockDots(){
  const dots=document.querySelectorAll('#ios-dots span');
  dots.forEach((d,i)=>{
    if(i<unlockCodeEntered.length)d.classList.add('filled');
    else d.classList.remove('filled');
  });
}
function onKeypadPress(digit){
  if(unlockCodeEntered.length>=6)return;
  unlockCodeEntered+=digit;
  updateLockDots();
  if(unlockCodeEntered.length===6){
    setTimeout(checkPasscode,180);   // let the last dot visually fill first
  }
}
function onKeypadDelete(){
  unlockCodeEntered=unlockCodeEntered.slice(0,-1);
  updateLockDots();
}
function checkPasscode(){
  if(unlockCodeEntered===CORRECT_CODE){
    // open the padlock glyph briefly before triggering the rest
    const pad=document.getElementById('ios-padlock');
    if(pad)pad.classList.add('unlocked');
    setTimeout(triggerUnlock,260);
  }else{
    // wrong: shake the dots (iOS-accurate, not the panel)
    const dots=document.getElementById('ios-dots');
    dots.classList.add('shake');
    setTimeout(()=>dots.classList.remove('shake'),450);
    setTimeout(()=>{unlockCodeEntered='';updateLockDots();},500);
  }
}

function triggerUnlock(){
  if(isUnlocked)return;
  isUnlocked=true;
  console.log('%c🔓 unlocked — the universe arrives','color:#8fc;font-weight:bold;font-size:13px');
  // restore full control sensitivity now that we're zooming out
  controls.rotateSpeed=1.0;
  controls.zoomSpeed=1.0;
  // fade the overlay out
  hideLockOverlay();
  // Reveal all hidden objects together — phone-in-void → room arrives as one moment
  lockedObjects.forEach(obj=>{obj.visible=true;});
  // ramp lights smoothly over camera-pullback duration
  unlockLightRampActive=true;
  unlockLightRampT=0;
  // kick off camera pullback via preset tween, but with longer duration
  presetStartPos.copy(camera.position);
  presetStartTarget.copy(controls.target);
  presetTargetPos.copy(baseCamPos);
  presetTargetTgt.copy(baseCamLook);
  presetT=0;
  currentTweenDuration=4.2;
  presetActive=true;
  controls.enabled=false;
  controls.autoRotate=false;
  // Reveal the ambient hint + clock after the pullback completes
  setTimeout(()=>{
    document.getElementById('ambient').classList.add('on');
    document.getElementById('clock').classList.add('on');
  },3600);
}

    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    return days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate();

  function tickClock(){

function handleTerminalSubmit(raw){
  const cmd=raw.trim();
  if(cmd==='')return;
  addTerminalLine('$ '+cmd,'user');
  // parse
  if(cmd==='clear'){clearTerminalBody();return;}
  if(cmd==='exit'){hideTerminalOverlay();return;}
  if(cmd.startsWith('cat ')){
    const arg=cmd.slice(4).trim().replace(/^~?\/?/,'');
    const file=TERMINAL_COMMANDS._files[arg];
    if(file){file.forEach(l=>addTerminalLine(l));addTerminalLine('','');}
    else addTerminalLine(`cat: ${arg}: no such file`,'error');
    return;
  }
  if(cmd==='echo'||cmd.startsWith('echo ')){addTerminalLine(cmd.slice(5));return;}
  const fn=TERMINAL_COMMANDS[cmd];
  if(fn){fn().forEach(l=>addTerminalLine(l));addTerminalLine('','');}
  else addTerminalLine(`command not found: ${cmd}. type 'help'.`,'error');
}

function buildScene(woodTex){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x04060a);
  scene.environment=makeEnv();

  camera=new THREE.PerspectiveCamera(34,W()/H(),.1,500);
  camera.position.copy(baseCamPos);camera.lookAt(baseCamLook);

  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setSize(W(),H());renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
  renderer.outputEncoding=THREE.sRGBEncoding;
  document.getElementById('scene').appendChild(renderer.domElement);

  /* ─── OrbitControls — drag to rotate 360°, scroll/pinch to zoom ─── */
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.target.copy(baseCamLook);
  controls.enableDamping=true;
  controls.dampingFactor=0.08;
  controls.enablePan=false;
  controls.minDistance=2.0;
  controls.maxDistance=55;
  controls.minPolarAngle=0.12;               // almost straight-down view allowed
  controls.maxPolarAngle=Math.PI*0.93;       // almost underneath allowed
  controls.rotateSpeed=0.65;
  controls.zoomSpeed=0.75;
  controls.autoRotate=true;
  controls.autoRotateSpeed=0.12;             // slow drift when idle (was 0.35, was chaotic)
  controls.addEventListener('start',()=>{
    controls.autoRotate=false;
    if(idleTimer){clearTimeout(idleTimer);idleTimer=null}
  });
  controls.addEventListener('end',()=>{
    if(idleTimer)clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{controls.autoRotate=true},8000);
  });

  /* ─── BLOOM POST-PROCESSING — the cinematic lift ─── */
  composer=new THREE.EffectComposer(renderer);
  composer.setSize(W(),H());
  composer.addPass(new THREE.RenderPass(scene,camera));
  const bloom=new THREE.UnrealBloomPass(
    new THREE.Vector2(W(),H()),
    0.78,   // strength
    0.42,   // radius
    0.58    // threshold — only bright things bloom
  );
  composer.addPass(bloom);

  /* ═══════════════════════ INTERACTIVE LISTENERS ═══════════════════════
     keyboard presets (1-5), cursor parallax, Mercedes click/wheel.
     wired up here so renderer.domElement and controls exist.
  */
  // drag-state tracking (so parallax can pause while user is orbiting)
  controls.addEventListener('start',()=>{isDragging=true;});
  controls.addEventListener('end',()=>{isDragging=false;});

  // cursor tracking — normalized to [-1, 1]
  document.addEventListener('mousemove',(e)=>{
    cursorNX=(e.clientX/W())*2-1;
    cursorNY=(e.clientY/H())*2-1;
  });

  // ─── keyboard preset views (1–5) ───
  const PRESETS={
    '1':{pos:[-12,20,48], tgt:[0,0,-0.5],   label:'1 · Deep Space'},
    '2':{pos:[1,12,2],    tgt:[0,0,-0.5],   label:'2 · Top Down'},
    '3':{pos:[6.7,1.8,4.3],tgt:[4.2,0.8,0.8],label:'3 · Mercedes'},
    '4':{pos:[0,2.5,5.5], tgt:[0,1.5,-2.5], label:'4 · Monitor'},
    '5':{pos:[-11,2.5,2], tgt:[0,1,-0.5],   label:'5 · Side Profile'}
  };
  document.addEventListener('keydown',(e)=>{
    // Only fire presets post-unlock and when no modal is capturing input
    if(!isUnlocked||terminalOpen)return;
    if(document.getElementById('lock-overlay').classList.contains('show'))return;
    const p=PRESETS[e.key];
    if(p&&!flyInActive&&!presetActive){
      presetStartPos.copy(camera.position);
      presetStartTarget.copy(controls.target);
      presetTargetPos.set(...p.pos);
      presetTargetTgt.set(...p.tgt);
      presetActive=true;presetT=0;
      controls.enabled=false;controls.autoRotate=false;
      console.log(`%c→ ${p.label}`,'color:#89f;font-weight:bold');
    }
  });

  // ─── W key → WARP DRIVE (post-unlock only) ───
  document.addEventListener('keydown',(e)=>{
    if((e.key==='w'||e.key==='W')&&isUnlocked&&!warpActive&&!presetActive&&!unlockLightRampActive&&!terminalOpen){
      warpActive=true;
      warpCamStartPos.copy(camera.position);
      controls.enabled=false;controls.autoRotate=false;
      console.log('%c⟿ WARP ENGAGED','color:#6ff;font-weight:bold;font-size:13px');
    }
  });
  document.addEventListener('keyup',(e)=>{
    if((e.key==='w'||e.key==='W')&&warpActive){
      warpActive=false;
      console.log('%c⟸ warp disengaged','color:#6ff');
    }
  });

  // ─── Mercedes click + wheel interactions ───
  // drag-threshold so orbiting doesn't register as a click
  let pdX=0,pdY=0,pdT=0;
  let clickTimer=null;
  renderer.domElement.addEventListener('pointerdown',(e)=>{
    pdX=e.clientX;pdY=e.clientY;pdT=Date.now();
  });
  renderer.domElement.addEventListener('pointerup',(e)=>{
    const dx=Math.abs(e.clientX-pdX);
    const dy=Math.abs(e.clientY-pdY);
    const dt=Date.now()-pdT;
    if(dx<6&&dy<6&&dt<400){
      // ─── pre-unlock: tap phone → camera flies into phone, then keypad ───
      if(!isUnlocked){
        if(raycastPhone(e.clientX,e.clientY)){
          flyIntoPhone();
        }
        return;   // nothing else is interactive pre-unlock
      }
      // ─── post-unlock: Monitor click → open terminal ───
      if(raycastMonitor(e.clientX,e.clientY)){
        showTerminalOverlay();
        return;
      }
      // ─── post-unlock: Mercedes click ───
      if(!raycastMercedes(e.clientX,e.clientY))return;
      // single-vs-double click via timer
      if(clickTimer){
        clearTimeout(clickTimer);clickTimer=null;
        cyclePaintColor();
      }else{
        clickTimer=setTimeout(()=>{
          clickTimer=null;
          mercedesSpinning=!mercedesSpinning;
          console.log(`%c→ Mercedes spin: ${mercedesSpinning?'on':'off'}`,'color:#89f');
        },260);
      }
    }
  });
  // scroll wheel over Mercedes → adjust spin speed (captures to block OrbitControls zoom)
  renderer.domElement.addEventListener('wheel',(e)=>{
    if(raycastMercedes(e.clientX,e.clientY)){
      e.preventDefault();e.stopPropagation();
      mercedesSpinSpeed=Math.max(0,Math.min(2,mercedesSpinSpeed+(-Math.sign(e.deltaY)*0.05)));
      console.log(`%c→ Mercedes speed: ${mercedesSpinSpeed.toFixed(2)}`,'color:#89f');
    }
  },{passive:false,capture:true});

  // ─── helpers ───
  function raycastMercedes(x,y){
    if(!loaded.mercedes)return false;
    mouseV2.x=(x/W())*2-1;mouseV2.y=-(y/H())*2+1;
    raycaster.setFromCamera(mouseV2,camera);
    return raycaster.intersectObject(loaded.mercedes,true).length>0;
  }
  function cyclePaintColor(){
    if(!loaded.mercedes)return;
    const PAINT=[null,0xc0c0c8,0x1a1a1e,0x3a4048,0xa68b5b,0x7a1a1a];
    const NAMES=['original','silver','obsidian','gunmetal','champagne','ruby'];
    paintIndex=(paintIndex+1)%PAINT.length;
    // cache originals the first time we change color (so we can restore)
    if(!originalPaintColors){
      originalPaintColors=new Map();
      loaded.mercedes.traverse(o=>{
        if(o.isMesh&&o.material){
          const ms=Array.isArray(o.material)?o.material:[o.material];
          ms.forEach(m=>{
            if(/body|boot|door|fender|hood|roof|bump|side/i.test(m.name||'')&&m.color)
              originalPaintColors.set(m.uuid,m.color.clone());
          });
        }
      });
    }
    const hex=PAINT[paintIndex];
    loaded.mercedes.traverse(o=>{
      if(o.isMesh&&o.material){
        const ms=Array.isArray(o.material)?o.material:[o.material];
        ms.forEach(m=>{
          if(originalPaintColors.has(m.uuid)){
            if(hex===null)m.color.copy(originalPaintColors.get(m.uuid));
            else m.color.setHex(hex);
            m.needsUpdate=true;
          }
        });
      }
    });
    console.log(`%c→ Mercedes paint: ${NAMES[paintIndex]}`,'color:#89f;font-weight:bold');
  }

  /* Lighting — restrained */
  const hemi=new THREE.HemisphereLight(0x8090a8,0x080604,.20);
  hemi.userData.preUnlockKeep=true;
  scene.add(hemi);

  lampLight=new THREE.SpotLight(0xffb06a,1.3,22,Math.PI*.38,.7,1.3);
  lampLight.position.set(-5.5,6.5,5);
  lampLight.target.position.set(-0.3,.4,1);
  lampLight.castShadow=true;
  lampLight.shadow.mapSize.set(1024,1024);
  lampLight.shadow.bias=-.0003;lampLight.shadow.normalBias=.014;
  scene.add(lampLight,lampLight.target);

  const fill=new THREE.DirectionalLight(0x5070a0,.28);
  fill.position.set(5,5,2);fill.userData.preUnlockKeep=true;scene.add(fill);

  const warmPocket=new THREE.PointLight(0xffa66a,.28,5,2);
  warmPocket.position.set(-1,1.5,2.5);scene.add(warmPocket);

  /* Desk — hidden pre-unlock (phone floats in void); revealed on unlock */
  const desk=new THREE.Mesh(
    new THREE.BoxGeometry(15,.2,7.5),
    new THREE.MeshStandardMaterial({map:woodTex,color:0xa89078,metalness:.05,roughness:.68,envMapIntensity:.6})
  );
  desk.receiveShadow=true;scene.add(desk);

  const lip=new THREE.Mesh(new THREE.BoxGeometry(15,.04,.04),new THREE.MeshStandardMaterial({color:0x5a3e24,roughness:.55}));
  lip.position.set(0,.12,3.75);scene.add(lip);

  /* Desk mat */
  const mat=new THREE.Mesh(
    new THREE.BoxGeometry(4.8,.018,2.5),
    new THREE.MeshStandardMaterial({color:0x0a0b0e,roughness:.92,metalness:.05,envMapIntensity:.25})
  );
  mat.position.set(0,.119,1.6);mat.receiveShadow=true;scene.add(mat);

  /* Riser */
  const riser=new THREE.Mesh(
    new THREE.BoxGeometry(3.6,.22,1.4),
    new THREE.MeshStandardMaterial({color:0x1a1e24,metalness:.55,roughness:.4,envMapIntensity:.85})
  );
  riser.position.set(0,.23,-2.0);riser.castShadow=true;riser.receiveShadow=true;scene.add(riser);
  [-1.6,1.6].forEach(x=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(.08,.22,1.28),new THREE.MeshStandardMaterial({color:0x0e1014,metalness:.7,roughness:.3}));
    leg.position.set(x,.23,-2.0);scene.add(leg);
  });

  /* ══════════════ SPACE — starfield replaces the room ══════════════
     two layers:
       bg: ~4000 small dim stars at radius 140–180
       fg: ~300 brighter near-stars at radius 70–100
     both use additive blending so bloom catches them.
     a gentle rotation is applied in tick().
  */
  function buildStarSphere(count, rMin, rMax, baseSize, opacity) {
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      // uniform random point on a sphere
      const u = Math.random(), v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const r = rMin + Math.random() * (rMax - rMin);
      pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i*3+2] = r * Math.cos(phi);
      // color: 70% white, 15% blue-white, 15% warm-yellow
      const c = Math.random();
      if (c < 0.70) {
        col[i*3] = 0.92 + Math.random()*.08;
        col[i*3+1] = 0.92 + Math.random()*.08;
        col[i*3+2] = 0.95 + Math.random()*.05;
      } else if (c < 0.85) {
        col[i*3] = 0.62 + Math.random()*.20;
        col[i*3+1] = 0.76 + Math.random()*.14;
        col[i*3+2] = 1.00;
      } else {
        col[i*3] = 1.00;
        col[i*3+1] = 0.86 + Math.random()*.10;
        col[i*3+2] = 0.60 + Math.random()*.20;
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    return new THREE.Points(g, new THREE.PointsMaterial({
      size: baseSize, vertexColors: true, transparent: true, opacity: opacity,
      sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
    }));
  }
  const bgStars = buildStarSphere(4000, 140, 190, 0.28, 0.85);
  const fgStars = buildStarSphere(300,   70, 105, 0.75, 1.00);
  scene.add(bgStars);
  scene.add(fgStars);

  // ─── WARP STREAKS — each star duplicated as a line segment for warp mode ───
  function buildStarStreaks(starMesh, stretch){
    const srcPos=starMesh.geometry.attributes.position.array;
    const srcCol=starMesh.geometry.attributes.color.array;
    const count=srcPos.length/3;
    const linePos=new Float32Array(count*6);
    const lineCol=new Float32Array(count*6);
    for(let i=0;i<count;i++){
      const sx=srcPos[i*3], sy=srcPos[i*3+1], sz=srcPos[i*3+2];
      // line from slightly-inward point to slightly-outward point, giving a stretched look
      linePos[i*6]   = sx*0.88;
      linePos[i*6+1] = sy*0.88;
      linePos[i*6+2] = sz*0.88;
      linePos[i*6+3] = sx*(1+stretch);
      linePos[i*6+4] = sy*(1+stretch);
      linePos[i*6+5] = sz*(1+stretch);
      // bright at inner end, dim at outer end (gives a "motion blur" feel)
      for(let k=0;k<3;k++){
        lineCol[i*6+k]   = srcCol[i*3+k];
        lineCol[i*6+3+k] = srcCol[i*3+k]*0.12;
      }
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(linePos,3));
    g.setAttribute('color',   new THREE.BufferAttribute(lineCol,3));
    return new THREE.LineSegments(g,new THREE.LineBasicMaterial({
      vertexColors:true,transparent:true,opacity:0.95,
      blending:THREE.AdditiveBlending,depthWrite:false
    }));
  }
  const bgWarp=buildStarStreaks(bgStars,0.35);
  const fgWarp=buildStarStreaks(fgStars,0.45);
  bgWarp.visible=false;fgWarp.visible=false;
  scene.add(bgWarp,fgWarp);

  window.__stars = { bg: bgStars, fg: fgStars, bgWarp, fgWarp };

  /* ══════════════ LAMP FIXTURE (motivates the warm light) ══════════════ */
  const lampGroup=new THREE.Group();
  const lampBase=new THREE.Mesh(
    new THREE.CylinderGeometry(.34,.4,.08,18),
    new THREE.MeshStandardMaterial({color:0x1e1510,metalness:.75,roughness:.38})
  );
  lampBase.position.y=.04;lampBase.castShadow=true;lampGroup.add(lampBase);
  const lampStem=new THREE.Mesh(
    new THREE.CylinderGeometry(.04,.04,1.9,8),
    new THREE.MeshStandardMaterial({color:0x14100a,metalness:.82,roughness:.3})
  );
  lampStem.position.y=1.03;lampStem.castShadow=true;lampGroup.add(lampStem);
  const lampShade=new THREE.Mesh(
    new THREE.CylinderGeometry(.4,.55,.55,18,1,true),
    new THREE.MeshStandardMaterial({color:0xbb8454,roughness:.55,metalness:.15,emissive:0xff9848,emissiveIntensity:.75,side:THREE.DoubleSide})
  );
  lampShade.position.y=2.2;lampGroup.add(lampShade);
  const bulb=new THREE.Mesh(
    new THREE.SphereGeometry(.13,10,8),
    new THREE.MeshBasicMaterial({color:0xffc98a})
  );
  bulb.position.y=2.15;lampGroup.add(bulb);
  lampGroup.position.set(-5.2,0.10,-1.8);
  scene.add(lampGroup);

  // retarget the existing warm spotlight so it emanates from this lamp
  lampLight.position.set(-5.2,2.25,-1.8);
  lampLight.target.position.set(-0.3,.4,.5);
  // also add a small point light inside the shade for ambient glow
  const lampPt=new THREE.PointLight(0xffb878,.55,3.5,2);
  lampPt.position.set(-5.2,2.25,-1.8);
  scene.add(lampPt);

  /* ══════════════ PEDESTAL — the Mercedes's display platform ══════════════
     dark lacquered disk with a bright emissive ring.
     warm hero light from above + cool under-glow from the pedestal makes the car pop.
  */
  const pedestal=new THREE.Mesh(
    new THREE.CylinderGeometry(1.15,1.20,0.05,48),
    new THREE.MeshStandardMaterial({color:0x0d0d10,metalness:.72,roughness:.26,envMapIntensity:1.0})
  );
  pedestal.position.set(4.2,0.135,0.8);
  pedestal.receiveShadow=true;
  scene.add(pedestal);
  const pedRing=new THREE.Mesh(
    new THREE.TorusGeometry(1.15,0.018,8,72),
    new THREE.MeshStandardMaterial({color:0x000000,emissive:0x5aa0d8,emissiveIntensity:2.6,roughness:.35,metalness:0})
  );
  pedRing.rotation.x=Math.PI/2;
  pedRing.position.set(4.2,0.163,0.8);
  scene.add(pedRing);
  // cool rim glow from the pedestal edge
  const pedGlow=new THREE.PointLight(0x8ab4e0,.45,2.6,2);
  pedGlow.position.set(4.2,0.30,0.8);
  scene.add(pedGlow);
  // warm hero light from above — makes the car's shape + highlights readable
  const mercKey=new THREE.PointLight(0xffe6c8,1.1,4.2,2);
  mercKey.position.set(4.2,2.4,0.8);
  scene.add(mercKey);
  // small front fill — kills the dead shadow on the near side
  const mercFill=new THREE.PointLight(0xfff0dc,0.5,3.2,2);
  mercFill.position.set(4.2,1.0,2.4);
  scene.add(mercFill);

  /* ══════════════ BOOKS (small stack on desk) ══════════════ */
  const bookColors=[0x3a2818,0x5a3a1c,0x241418,0x2a1a22];
  const bookStack=new THREE.Group();
  bookColors.forEach((col,i)=>{
    const b=new THREE.Mesh(
      new THREE.BoxGeometry(.95,.1,.62),
      new THREE.MeshStandardMaterial({color:col,roughness:.82,metalness:0})
    );
    b.position.y=.05+i*.11;b.castShadow=true;b.receiveShadow=true;
    b.rotation.y=(i%2)*.04;
    bookStack.add(b);
  });
  bookStack.position.set(4.6,.12,-1.6);
  bookStack.rotation.y=.22;
  scene.add(bookStack);

  /* ══════════════ NOTEBOOK on desk ══════════════ */
  const notebook=new THREE.Mesh(
    new THREE.BoxGeometry(1.2,.08,.88),
    new THREE.MeshStandardMaterial({color:0x141014,roughness:.55,metalness:.12,envMapIntensity:.5})
  );
  notebook.position.set(-2.5,.16,1.45);notebook.rotation.y=-.12;
  notebook.castShadow=true;notebook.receiveShadow=true;
  scene.add(notebook);

  /* ══════════════ DUST MOTES (particles, caught in light) ══════════════ */
  const moteCount=140;
  const motePos=new Float32Array(moteCount*3);
  for(let i=0;i<moteCount;i++){
    motePos[i*3]=(Math.random()-.5)*14;
    motePos[i*3+1]=Math.random()*4.2+0.3;
    motePos[i*3+2]=(Math.random()-.5)*10-1;
  }
  const moteGeo=new THREE.BufferGeometry();
  moteGeo.setAttribute('position',new THREE.BufferAttribute(motePos,3));
  const moteMat=new THREE.PointsMaterial({
    color:0xffd8a8,size:0.035,transparent:true,opacity:.55,
    sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false
  });
  motes=new THREE.Points(moteGeo,moteMat);
  scene.add(motes);

  addEventListener('resize',onResize);
}

function loadAll(onDone){
  const loader=new THREE.GLTFLoader();
  // DRACO decoder — the Mercedes GLB uses KHR_draco_mesh_compression (required)
  const draco=new THREE.DRACOLoader();
  draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
  loader.setDRACOLoader(draco);
  const keys=Object.keys(MODELS);
  function next(i){
    if(i>=keys.length){onDone();return}
    const name=keys[i],cfg=MODELS[name];
    updateVeil(i/keys.length);
    loader.load(cfg.url,gltf=>{
      const root=gltf.scene;
      root.rotation.set(...cfg.rotation);root.updateMatrixWorld(true);
      const bbox=new THREE.Box3().setFromObject(root);
      const size=bbox.getSize(new THREE.Vector3());
      const maxDim=Math.max(size.x,size.y,size.z);
      const fit=cfg.targetWidth/Math.max(maxDim,.001);
      root.scale.setScalar(fit);root.updateMatrixWorld(true);
      const bbox2=new THREE.Box3().setFromObject(root);
      const center=bbox2.getCenter(new THREE.Vector3());
      const minY=bbox2.min.y;
      root.position.sub(new THREE.Vector3(center.x,minY,center.z));
      root.position.add(new THREE.Vector3(...cfg.position));
      root.traverse(o=>{
        if(o.isMesh){
          o.castShadow=true;o.receiveShadow=true;
          if(o.material){
            const mats=Array.isArray(o.material)?o.material:[o.material];
            mats.forEach(m=>{
              if(m.envMapIntensity!==undefined)m.envMapIntensity=1.1;
              if(cfg.tint!==undefined&&m.color){
                m.color=new THREE.Color(cfg.tint);
                m.metalness=0.7;
                m.roughness=0.45;
              }
              m.needsUpdate=true;
            });
          }
        }
      });
      if(cfg.spin){
        // Wrap in a pivot at the bbox-center XZ so rotation spins in place,
        // not orbits around root origin.
        const pivot=new THREE.Group();
        pivot.position.set(cfg.position[0],cfg.position[1],cfg.position[2]);
        root.position.sub(pivot.position);
        pivot.add(root);
        scene.add(pivot);
        loaded[name]=pivot;
      } else {
        loaded[name]=root;scene.add(root);
      }
      console.log('%c✓ loaded:','color:#6a8','%c'+name,'color:#aaa',cfg.url);
      next(i+1);
    },undefined,err=>{console.warn('%c✗ failed:','color:#c66','%c'+name,'color:#aaa',cfg.url,err);next(i+1)});
  }
  next(0);
}

function updateVeil(pct){
  document.getElementById('veil-bar').style.setProperty('--p',Math.round(pct*100)+'%');
  if(pct>.5&&!document.getElementById('veil').classList.contains('show-line'))document.getElementById('veil').classList.add('show-line');
}

function onResize(){
  camera.aspect=W()/H();camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
  if(composer)composer.setSize(W(),H());
}

/* Animation — controls-driven, with gentle life in lamp and iphone */
let tC=0;
function tick(){
  const dt=Math.min(clock.getDelta(),.1);tC+=dt;
  // Cinematic fly-in on first arrival
  if(flyInActive){
    flyInT+=dt;
    const t=Math.min(flyInT/flyInDuration,1);
    const e=1-Math.pow(1-t,3);   // easeOutCubic
    camera.position.lerpVectors(flyInStartPos,baseCamPos,e);
    camera.lookAt(baseCamLook);
    if(t>=1){
      flyInActive=false;
      camera.position.copy(baseCamPos);
      controls.target.copy(baseCamLook);
      controls.update();
      controls.enabled=true;
      setTimeout(()=>{if(!flyInActive)controls.autoRotate=true},2500);
    }
  } else if(presetActive){
    // ── preset camera tween (1–5 keys, or unlock pullback) ──
    presetT+=dt;
    const t=Math.min(presetT/currentTweenDuration,1);
    const e=1-Math.pow(1-t,3);   // easeOutCubic
    camera.position.lerpVectors(presetStartPos,presetTargetPos,e);
    controls.target.lerpVectors(presetStartTarget,presetTargetTgt,e);
    camera.lookAt(controls.target);
    if(t>=1){
      presetActive=false;
      camera.position.copy(presetTargetPos);
      controls.target.copy(presetTargetTgt);
      controls.enabled=true;
      controls.update();
      currentTweenDuration=PRESET_DURATION;   // reset for future preset jumps
      // after unlock pullback completes, let auto-rotate resume after a breath
      if(isUnlocked){
        setTimeout(()=>{if(!presetActive)controls.autoRotate=true;},2500);
      }
    }
  } else if(controls){
    controls.update();
    // ── cursor parallax (post-unlock only; skip at close phone-focus distance) ──
    if(isUnlocked){
      parallaxAmp+=(isDragging?-0.04:0.04);
      parallaxAmp=Math.max(0,Math.min(1,parallaxAmp));
      const tPX=cursorNX*0.28;         // horizontal sway
      const tPY=-cursorNY*0.18;        // vertical sway (inverted)
      parallaxX+=(tPX-parallaxX)*0.05;
      parallaxY+=(tPY-parallaxY)*0.05;
      // apply offset in camera's local right/up frame, cleared next frame by controls.update()
      const right=new THREE.Vector3(),up=new THREE.Vector3();
      camera.matrix.extractBasis(right,up,new THREE.Vector3());
      camera.position.addScaledVector(right,parallaxX*parallaxAmp);
      camera.position.addScaledVector(up,parallaxY*parallaxAmp);
    }
  }
  // Lamp — subtle oil-lamp flicker + Morse-code modulation (spells SUYASH) once fully unlocked
  if(lampLight){
    const noiseFlicker=Math.sin(tC*2.1)*.028+Math.sin(tC*13.7)*.014;
    if(isUnlocked&&!unlockLightRampActive){
      // decode current Morse phase
      const phase=tC%MORSE_CYCLE;
      let elapsed=0,morseOn=false;
      for(const p of morsePattern){
        if(phase<elapsed+p.duration){morseOn=p.on;break;}
        elapsed+=p.duration;
      }
      const morseBoost=morseOn?0.16:-0.10;
      lampLight.intensity=1.3+morseBoost+noiseFlicker;
    }
    // pre-unlock or mid-ramp: let lockScene / unlock-ramp own the intensity
  }
  // iPhone — very slow gentle pulse, like a heartbeat
  if(iphoneGlow)iphoneGlow.intensity=.35+Math.sin(tC*0.8)*.18;
  // Dust motes — slow upward drift, reset on exit
  if(motes){
    const p=motes.geometry.attributes.position;
    const a=p.array;
    for(let i=0;i<p.count;i++){
      a[i*3+1]+=0.004+Math.sin(tC*0.3+i*0.5)*0.0012;
      a[i*3]  +=Math.sin(tC*0.15+i*0.7)*0.0018;
      a[i*3+2]+=Math.cos(tC*0.12+i*0.4)*0.0014;
      if(a[i*3+1]>5.2){a[i*3+1]=0.2;a[i*3]=(Math.random()-.5)*14;a[i*3+2]=(Math.random()-.5)*10-1;}
    }
    p.needsUpdate=true;
  }
  // Mercedes — user-controllable rotation (click to toggle, scroll to adjust speed)
  if(loaded.mercedes&&mercedesSpinning)loaded.mercedes.rotation.y+=dt*mercedesSpinSpeed;
  // Starfield drift — barely perceptible, adds cosmic motion
  if(window.__stars){
    window.__stars.bg.rotation.y=tC*0.0018;
    window.__stars.fg.rotation.y=tC*0.0028;
    window.__stars.fg.rotation.x=tC*0.0009;
    // mirror rotation onto warp streaks so the transition looks continuous
    if(window.__stars.bgWarp){window.__stars.bgWarp.rotation.y=tC*0.0018;}
    if(window.__stars.fgWarp){window.__stars.fgWarp.rotation.y=tC*0.0028;window.__stars.fgWarp.rotation.x=tC*0.0009;}
  }
  // ─── WARP DRIVE: hold W to engage. stars stretch into streaks, camera flies forward. release to return. ───
  const prevWarpI=warpIntensity;
  if(warpActive){
    warpIntensity=Math.min(1,warpIntensity+dt*1.8);
  }else{
    warpIntensity=Math.max(0,warpIntensity-dt*2.4);
  }
  if(warpIntensity>0.02||prevWarpI>0.02){
    const useStreaks=warpIntensity>0.12;
    if(window.__stars){
      window.__stars.bg.visible=!useStreaks;
      window.__stars.fg.visible=!useStreaks;
      if(window.__stars.bgWarp)window.__stars.bgWarp.visible=useStreaks;
      if(window.__stars.fgWarp)window.__stars.fgWarp.visible=useStreaks;
    }
    if(warpActive){
      // push camera forward along its view direction, scaled by intensity
      const fwd=new THREE.Vector3();
      camera.getWorldDirection(fwd);
      camera.position.addScaledVector(fwd,dt*18*warpIntensity);
    }else if(warpIntensity<1){
      // snap camera back toward warp start
      camera.position.lerp(warpCamStartPos,0.08);
      if(warpIntensity<0.05&&camera.position.distanceTo(warpCamStartPos)<0.3){
        camera.position.copy(warpCamStartPos);
        if(!presetActive)controls.enabled=true;
      }
    }
  }
  // ─── unlock light ramp: smoothly bring dimmed lights from 0 to their original intensity ───
  if(unlockLightRampActive){
    unlockLightRampT+=dt;
    const t=Math.min(unlockLightRampT/UNLOCK_LIGHT_RAMP_DURATION,1);
    const e=1-Math.pow(1-t,2);  // easeOutQuad — smooth fade-in
    dimmedLights.forEach(l=>{
      l.intensity=(l.userData._origIntensity||0)*e;
    });
    if(t>=1)unlockLightRampActive=false;
  }
  // render through bloom composer (fallback to direct render if composer not ready)
  if(composer)composer.render();
  else if(renderer&&scene&&camera)renderer.render(scene,camera);
  requestAnimationFrame(tick);
}

    // LOCK THE SCENE — hides everything except desk + phone + base lights
    lockScene();
    updateVeil(1);
    setTimeout(()=>{
      // Fade the veil away to reveal just the phone on the desk in darkness
      document.getElementById('veil').classList.add('gone');
      setTimeout(()=>document.getElementById('veil').style.display='none',2500);
      // Show the pre-unlock hint after the veil clears
      setTimeout(()=>document.getElementById('phone-hint').classList.add('on'),600);
      // ambient + clock stay hidden until unlock (revealed in triggerUnlock post-animation)
    },900);
  });
  tick();
});
